<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Tablet</title>
  <style>
    :root {
      --shell-width: min(1120px, 96vw);
      --shell-height: min(820px, 92vh);
      --font-ui: "Aptos Display", "Trebuchet MS", "Segoe UI Variable Text", sans-serif;
      --table-a: #d26e52;
      --table-b: #b95741;
      --ink: #172126;
      --muted: #53616a;
      --line: rgba(23, 33, 38, 0.12);
      --glass: rgba(255, 255, 255, 0.68);
      --brand-a: #23566a;
      --brand-b: #337c85;
      --tile-a: linear-gradient(135deg, #255c7c, #5ca8c8);
      --tile-b: linear-gradient(135deg, #6f4a9d, #bb83d7);
      --tile-c: linear-gradient(135deg, #b45745, #e8a06f);
      --tile-d: linear-gradient(135deg, #2f7051, #79b98b);
      --modal-bg: rgba(10, 18, 24, 0.42);
      --shadow: 0 30px 66px rgba(48, 25, 18, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-x: hidden;
      color: var(--ink);
      font-family: var(--font-ui);
      background:
        radial-gradient(ellipse at 48% 42%, rgba(255, 198, 157, 0.36), transparent 48%),
        radial-gradient(ellipse at 18% 10%, rgba(255, 232, 199, 0.18), transparent 32%),
        linear-gradient(180deg, var(--table-a), var(--table-b));
    }

    body.modal-open {
      overflow: hidden;
    }

    .tablet-shell {
      width: var(--shell-width);
      height: var(--shell-height);
      min-height: 700px;
      position: relative;
      isolation: isolate;
    }

    .tablet-shell::before {
      content: "";
      position: absolute;
      left: 7%;
      right: 7%;
      bottom: -22px;
      height: 92px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(55, 24, 15, 0.38), rgba(55, 24, 15, 0.16) 52%, transparent 74%);
      filter: blur(10px);
      z-index: -1;
    }

    .tablet-frame {
      position: relative;
      z-index: 1;
      height: 100%;
      overflow: hidden;
      border: 13px solid #172126;
      border-radius: 38px;
      background: #10181d;
      box-shadow: var(--shadow);
    }

    .tablet-frame::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 50%;
      width: 86px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      transform: translateX(-50%);
      z-index: 4;
    }

    .screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 38%),
        linear-gradient(145deg, #214553 0%, #397a80 38%, #8db7a7 72%, #eef0db 100%);
    }

    .status-bar {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 52px;
      padding: 0 28px;
      color: rgba(255, 255, 255, 0.94);
      font-size: 13px;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.18);
    }

    .home-link {
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .app-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 132px));
      gap: 18px;
      align-content: start;
      padding: 26px 28px 90px;
      min-height: calc(100% - 52px);
    }

    .app-tile {
      border: none;
      padding: 0;
      background: transparent;
      color: #fff;
      font: inherit;
      cursor: pointer;
      text-align: center;
    }

    .app-tile-card {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 14px 10px;
      border-radius: 24px;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .app-tile:hover .app-tile-card,
    .app-tile:focus-visible .app-tile-card {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 16px 30px rgba(12, 22, 26, 0.18);
    }

    .app-tile:focus-visible {
      outline: none;
    }

    .app-icon {
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28), 0 12px 22px rgba(9, 20, 24, 0.2);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .app-icon--mock {
      position: relative;
      overflow: hidden;
      border: 2px solid #202020;
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(20, 20, 20, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, #ffffff, #f7f7f2);
      background-size: 10px 100%, auto;
      color: #111;
      box-shadow: inset 0 0 0 4px #fff, 0 12px 22px rgba(9, 20, 24, 0.2);
    }

    .mock-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      height: 28px;
      border: 2px solid #111;
      color: #111;
      font-family: "Batang", "Gungsuh", "Times New Roman", serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1;
      background: rgba(255, 255, 255, 0.86);
    }

    .app-icon--ebs {
      position: relative;
      overflow: hidden;
      border: 3px solid #173465;
      border-radius: 22px;
      background: #fffdf7;
      color: #173465;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 12px 22px rgba(9, 20, 24, 0.2);
    }

    .app-icon--ebs::before {
      content: "";
      position: absolute;
      left: 8px;
      bottom: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e08a35, #efd5aa);
      box-shadow: 16px -8px 0 -8px rgba(23, 52, 101, 0.24);
    }

    .ebs-mark {
      position: relative;
      z-index: 1;
      color: #173465;
      font-family: "Arial Black", "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .app-icon--c { background: var(--tile-c); }
    .app-icon--d { background: var(--tile-d); }

    .app-name {
      font-size: 14px;
      font-weight: 850;
      line-height: 1.25;
      min-height: 18px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    .dock {
      position: absolute;
      left: 50%;
      bottom: 22px;
      z-index: 3;
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
    }

    .dock-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.16);
    }

    .app-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--modal-bg);
      backdrop-filter: blur(10px);
    }

    .app-modal[hidden] {
      display: none;
    }

    .app-window {
      width: min(1000px, calc(100vw - 24px));
      height: min(720px, calc(100vh - 24px));
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 28px;
      background: rgba(251, 250, 246, 0.97);
      box-shadow: 0 24px 60px rgba(10, 18, 24, 0.28);
    }

    .app-window-head {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 18px 14px 22px;
      border-bottom: 1px solid rgba(23, 33, 38, 0.1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(242, 244, 239, 0.9));
    }

    .app-window-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .app-window-title strong {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.05;
    }

    .app-window-title span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .app-window-close {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: rgba(23, 33, 38, 0.08);
      color: var(--ink);
      font: inherit;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
    }

    .app-window-body {
      overflow: auto;
      padding: 24px;
    }

    .app-pane {
      display: grid;
      gap: 18px;
    }

    .app-hero {
      display: grid;
      gap: 10px;
      padding: 20px;
      border: 1px solid rgba(23, 33, 38, 0.08);
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(235, 241, 238, 0.9));
    }

    .app-hero-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
    }

    .app-hero h2,
    .app-card h3 {
      margin: 0;
      line-height: 1.12;
    }

    .app-hero h2 {
      font-size: 28px;
    }

    .app-hero p,
    .app-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .metric-grid,
    .app-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .metric-card,
    .app-card {
      border: 1px solid rgba(23, 33, 38, 0.08);
      border-radius: 20px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 18px rgba(17, 31, 37, 0.05);
    }

    .metric-card span {
      display: block;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .metric-card strong {
      display: block;
      font-size: 19px;
      line-height: 1.2;
      word-break: break-word;
    }

    .app-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .app-list-item {
      padding: 11px 12px;
      border-radius: 14px;
      background: rgba(241, 244, 241, 0.92);
      border: 1px solid rgba(23, 33, 38, 0.06);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.5;
      word-break: keep-all;
    }

    @media (max-width: 720px) {
      body {
        padding: 10px;
      }

      .tablet-shell {
        min-height: 620px;
      }

      .tablet-frame {
        border-width: 9px;
        border-radius: 30px;
      }

      .status-bar {
        padding: 0 18px;
      }

      .app-grid {
        grid-template-columns: repeat(2, minmax(0, 132px));
        gap: 14px;
        padding: 18px 18px 86px;
      }

      .metric-grid,
      .app-grid-2 {
        grid-template-columns: 1fr;
      }

      .app-window {
        grid-template-rows: 66px minmax(0, 1fr);
      }

      .app-window-body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="tablet-shell">
    <div class="tablet-frame">
      <main class="screen" aria-label="Student tablet screen">
        <div class="status-bar">
          <span id="clock-label">--:--</span>
          <span id="student-id-label">Guest</span>
          <button class="home-link" id="back-to-tray" type="button">Tray</button>
        </div>

        <div class="app-grid">
          <button class="app-tile" type="button" data-tool-url="mock-exam-tool.html" aria-label="모의고사 전용도구" title="모의고사 전용도구">
            <span class="app-tile-card">
              <span class="app-icon app-icon--mock"><span class="mock-mark">모의고사</span></span>
              <span class="app-name">모의고사 전용도구</span>
            </span>
          </button>
          <button class="app-tile" type="button" data-tool-url="ebs-tool.html" aria-label="EBS 도구" title="EBS 도구">
            <span class="app-tile-card">
              <span class="app-icon app-icon--ebs"><span class="ebs-mark">EBS</span></span>
              <span class="app-name">EBS 도구</span>
            </span>
          </button>
          <button class="app-tile" type="button" data-tool-url="alpha_test.html" aria-label="오늘의 숙제" title="오늘의 숙제">
            <span class="app-tile-card">
              <span class="app-icon app-icon--c">HW</span>
              <span class="app-name">오늘의 숙제</span>
            </span>
          </button>
        </div>

        <div class="dock" aria-hidden="true">
          <span class="dock-dot"></span>
          <span class="dock-dot"></span>
          <span class="dock-dot"></span>
        </div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(location.search || "");
      const userId = String(params.get("id") || "").trim();
      const idLabel = document.getElementById("student-id-label");
      const clockLabel = document.getElementById("clock-label");
      const backBtn = document.getElementById("back-to-tray");

      function updateClock() {
        const now = new Date();
        if (clockLabel) {
          clockLabel.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }
      }

      function buildTrayUrl() {
        const target = new URL("homework-tray_v1.html", location.href);
        if (userId) target.searchParams.set("id", userId);
        return target.toString();
      }

      function buildToolUrl(filename) {
        const target = new URL(String(filename || ""), location.href);
        if (userId) target.searchParams.set("id", userId);
        return target.toString();
      }

      if (idLabel) idLabel.textContent = userId ? `ID ${userId}` : "Guest";
      updateClock();
      setInterval(updateClock, 15000);

      document.querySelectorAll("[data-tool-url]").forEach((btn) => {
        btn.addEventListener("click", () => {
          location.href = buildToolUrl(btn.getAttribute("data-tool-url"));
        });
      });

      if (backBtn) {
        backBtn.addEventListener("click", () => {
          location.href = buildTrayUrl();
        });
      }
    })();
  </script>
</body>
</html>
