<html lang="ko">
<head>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;

      color: #2d241b;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      line-height: 1.6;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    header {
      background: #fffaf1;
      border: 2px solid #d7c2a3;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 22px;
      box-shadow: 0 8px 20px rgba(70, 45, 20, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 34px 0 14px;
      font-size: 22px;
      border-left: 8px solid #8fbfa8;
      padding-left: 12px;
    }

    .note {
      margin: 0;
      color: #6b5b48;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 22px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 15px;
      background: #4f8f72;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { filter: brightness(0.96); }

    button:disabled {
      background: #b8b1a7;
      cursor: default;
      filter: none;
    }

    .score-box {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 14px;
      background: #fff;
      border: 1px solid #d7c2a3;
      border-radius: 999px;
      font-weight: 800;
      color: #3c6f58;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: #fffaf1;
      border: 1.5px solid #d7c2a3;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 5px 14px rgba(70, 45, 20, 0.06);
    }

    .qnum {
      display: inline-block;
      min-width: 34px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 999px;
      background: #e6d4b9;
      color: #3d3024;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .sentence {
      font-size: 17px;
      font-weight: 800;
      margin: 4px 0 6px;
    }

    .meaning {
      font-size: 14px;
      color: #6f604f;
      margin-bottom: 12px;
    }

    .blank {
      display: inline-block;
      min-width: 110px;
      border-bottom: 3px solid #4f8f72;
      transform: translateY(-2px);
    }

    .choices {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    label.choice {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: #ffffff;
      border: 1px solid #e5d8c8;
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-size: 15px;
    }

    label.choice:hover { background: #f1f8f4; }

    label.choice.locked {
      cursor: default;
      opacity: 0.85;
    }

    label.choice.selected-correct {
      border-color: #2f9b6c;
      background: #f0fff7;
    }

    label.choice.selected-wrong {
      border-color: #c84b41;
      background: #fff1ef;
    }

    input[type="radio"]:disabled {
      cursor: default;
    }

    .result {
      margin-top: 10px;
      min-height: 24px;
      font-weight: 800;
    }

    .correct { color: #23805a; }
    .wrong { color: #b13b32; }

    .writing-list {
      display: grid;
      gap: 14px;
    }

    .writing-card {
      background: #fffaf1;
      border: 1.5px solid #d7c2a3;
      border-radius: 18px;
      padding: 16px;
    }

    .writing-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    input.text-answer {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid #ccb898;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
    }

    input.text-answer.ok {
      border-color: #2f9b6c;
      background: #f0fff7;
    }

    input.text-answer.no {
      border-color: #c84b41;
      background: #fff1ef;
    }

    input.text-answer:disabled {
      color: #2d241b;
      opacity: 1;
    }

    .mini-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .condition {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #eadbc5;
      color: #4d3c2b;
      font-weight: 800;
      font-size: 13px;
    }

    .submit-panel {
      margin-top: 28px;
      padding: 18px;
      background: #fffaf1;
      border: 1.5px solid #d7c2a3;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .submit-panel .submit-status {
      min-height: 22px;
      font-weight: 800;
      color: #4d3c2b;
    }

    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .wrap { padding: 18px 12px 48px; }
    }

    @media print {
      body { background: white; }

      .toolbar,
      button {
        display: none !important;
      }

      .card,
      .writing-card,
      header {
        box-shadow: none;
        break-inside: avoid;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

      {

        meaning: "이것이 누구의 휴대폰인지 아니?",
        condition: "whose phone / this / be",
        answers: ["whose phone this is"]
      },
      {
        sentence: "Tell me ____.",
        meaning: "그들이 언제 도착할지 말해줘.",
        condition: "when / they / arrive",
        answers: ["when they will arrive", "when they arrive"]
      },
      {
        sentence: "Nobody knows ____.",
        meaning: "그녀가 왜 떠났는지 아무도 모른다.",
        condition: "why / she / leave",
        answers: ["why she left"]
      },
      {
        sentence: "I can't decide ____.",
        meaning: "그것을 받아들일지 결정할 수 없다.",
        condition: "whether + to부정사",
        answers: ["whether to accept it"]
      },
      {
        sentence: "I don't understand ____.",
        meaning: "무슨 일이 일어났는지 이해하지 못하겠다.",
        condition: "what / happen",
        answers: ["what happened"]
      },
      {
        sentence: "The problem is ____.",
        meaning: "우리가 그 문제를 어떻게 풀 수 있느냐이다.",
        condition: "how / we / can / solve the problem",
        answers: ["how we can solve the problem"]
      },
      {
        sentence: "____ surprised everyone.",
        meaning: "그가 말한 것이 모두를 놀라게 했다.",
        condition: "what / he / say",
        answers: ["what he said"]
      }
    ];

    const HWPLUS_API_URL = "https://port-0-ltryi-database-1ru12mlw3glz2u.sel5.cloudtype.app/api/saveHWPlus";
    const SUBMIT_MARKER_KEY = "imsi_bitnalee_hw_3_submit_marker_v1";
    const DIRECT_SUBCATEGORY = "\uACF5\uC0AC\uC911";
    const DIRECT_HWTYPE = "doneinweb";
    const DIRECT_COMMENT = "imsi_bitnalee_hw_3 answers";

    let submittedToday = false;
    let isSubmitting = false;
    let submitStatus = "";

    function getCurrentUserId() {
      try {
        return String(new URLSearchParams(window.location.search || "").get("id") || "").trim();
      } catch (_) {
        return "";
      }
    }

    function getKstTodayString() {
      const now = new Date(Date.now() + (9 * 60 * 60 * 1000));
      return now.toISOString().slice(0, 10);
    }

    function readSubmitMarker() {
      try {
        const raw = localStorage.getItem(SUBMIT_MARKER_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function writeSubmitMarker(userId, dateStr) {
      localStorage.setItem(SUBMIT_MARKER_KEY, JSON.stringify({
        userId: String(userId || ""),
        date: String(dateStr || "")
      }));
    }

    function clearSubmitMarker() {
      localStorage.removeItem(SUBMIT_MARKER_KEY);
    }

    function hasLocalSubmittedToday(userId) {
      const marker = readSubmitMarker();
      if (!marker) return false;
      return String(marker.userId || "") === String(userId || "") && String(marker.date || "") === getKstTodayString();
    }

    async function fetchSubmittedTodayFromServer(userId) {
      const res = await fetch(`${HWPLUS_API_URL.replace("/saveHWPlus", "/getHWPlus")}?userId=${encodeURIComponent(userId)}`);
      if (!res.ok) throw new Error(String(res.status));

      const data = await res.json();
      if (!Array.isArray(data)) return false;

      const todayStr = getKstTodayString();
      return data.some((item) => {
        const timestamp = String(item.Timestamp || item.timestamp || "");
        const subcategory = String(item.Subcategory || item.subcategory || "").trim();
        const hwType = String(item.HWType || item.hwtype || "").trim();
        const comment = String(item.Comment || item.comment || "").trim();
        return (
          timestamp.startsWith(todayStr) &&
          subcategory === DIRECT_SUBCATEGORY &&
          hwType === DIRECT_HWTYPE &&
          comment === DIRECT_COMMENT
        );
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitForServerSubmission(userId, attempts = 4, delayMs = 450) {
      for (let i = 0; i < attempts; i += 1) {
        try {
          if (await fetchSubmittedTodayFromServer(userId)) return true;
        } catch (_) {
        }

        if (i < attempts - 1) await wait(delayMs);
      }
      return false;
    }

    async function checkSubmittedToday() {
      const userId = getCurrentUserId();
      if (!userId) return false;

      const hasLocalMarker = hasLocalSubmittedToday(userId);
      try {
        const hasServerRecord = await fetchSubmittedTodayFromServer(userId);
        if (hasServerRecord) {
          if (!hasLocalMarker) writeSubmitMarker(userId, getKstTodayString());
          return true;
        }
        if (hasLocalMarker) clearSubmitMarker();
        return false;
      } catch (_) {
        return hasLocalMarker;
      }
    }

    function buildTrayUrl() {
      const userId = getCurrentUserId();
      const target = new URL("homework-tray_v1.html", window.location.href);
      if (userId) target.searchParams.set("id", userId);
      return target.toString();
    }

    function showToast(kind, message, options) {
      if (window.ImsiToastFX && typeof window.ImsiToastFX.show === "function") {
        window.ImsiToastFX.show(kind, message, options);
      }
    }

    function renderSubmitStatus() {
      const statusEl = document.getElementById("submitStatus");
      const submitBtn = document.getElementById("submitBtn");
      if (statusEl) statusEl.textContent = submitStatus;
      if (submitBtn) {
        submitBtn.disabled = isSubmitting || submittedToday;
        submitBtn.textContent = submittedToday ? "\uC81C\uCD9C \uC644\uB8CC" : "\uC81C\uCD9C";
      }
    }

    function getStatusLabel(isAnswered, isCorrect) {
      if (!isAnswered) return "\uBBF8\uC751\uB2F5";
      return isCorrect ? "\uC815\uB2F5" : "\uC624\uB2F5";
    }

    function getMCSelectedIndex(index) {
      const selected = document.querySelector(`input[name="mc${index}"]:checked`);
      return selected ? Number(selected.value) : null;
    }

    function getMCChoiceLabel(question, choiceIndex) {
      if (!Number.isInteger(choiceIndex) || choiceIndex < 0 || choiceIndex >= question.choices.length) {
        return "\uBBF8\uC751\uB2F5";
      }
      return `${choiceIndex + 1}. ${question.choices[choiceIndex]}`;
    }

    function getWritingInputValue(type, index) {
      const input = document.getElementById(`${type}Input${index}`);
      return input ? String(input.value || "").trim() : "";
    }

    function isWritingAnswerCorrect(question, userValue) {
      if (!normalize(userValue)) return false;
      return question.answers.map(normalize).includes(normalize(userValue));
    }

    function pushSubmissionBlock(lines, heading, question, enteredAnswer, correctAnswer, statusLabel) {
      lines.push(heading);
      lines.push(`\uBB38\uC81C: ${question.sentence}`);
      if (question.meaning) lines.push(`\uC758\uBBF8: ${question.meaning}`);
      if (question.condition) lines.push(`\uC870\uAC74: ${question.condition}`);
      lines.push(`\uC785\uB825 \uB2F5: ${enteredAnswer || "\uBBF8\uC751\uB2F5"}`);
      lines.push(`\uC815\uB2F5\uC5EC\uBD80: ${statusLabel}`);
      lines.push(`\uC815\uB2F5: ${correctAnswer}`);
      lines.push("");
    }

    function buildSubmissionText(userId) {
      let total = 0;
      let correct = 0;
      const lines = [
        `userId: ${userId}`,
        `date: ${getKstTodayString()}`,
        ""
      ];

      mcQuestions.forEach((question, index) => {
        total++;
        const selectedIndex = getMCSelectedIndex(index);
        const isAnswered = Number.isInteger(selectedIndex);
        const isCorrect = selectedIndex === question.answer;
        if (isCorrect) correct++;

        pushSubmissionBlock(
          lines,
          `[multiple choice ${index + 1}]`,
          question,
          getMCChoiceLabel(question, selectedIndex),
          getMCChoiceLabel(question, question.answer),
          getStatusLabel(isAnswered, isCorrect)
        );
      });

      [
        ["direct", directQuestions, "direct writing"],
        ["condition", conditionQuestions, "condition writing"]
      ].forEach(([type, data, label]) => {
        data.forEach((question, index) => {
          total++;
          const userValue = getWritingInputValue(type, index);
          const isAnswered = Boolean(normalize(userValue));
          const isCorrect = isWritingAnswerCorrect(question, userValue);
          if (isCorrect) correct++;

          pushSubmissionBlock(
            lines,
            `[${label} ${index + 1}]`,
            question,
            userValue,
            question.answers.join(" / "),
            getStatusLabel(isAnswered, isCorrect)
          );
        });
      });

      lines.splice(2, 0, `score: ${correct} / ${total}`);
      return lines.join("\n");
    }

    async function submitAllAnswers() {
      if (isSubmitting) return;
      if (submittedToday) {
        submitStatus = "\uC624\uB298\uC740 \uC774\uBBF8 \uC81C\uCD9C\uD588\uC2B5\uB2C8\uB2E4.";
        renderSubmitStatus();
        showToast("no", submitStatus);
        return;
      }

      const userId = getCurrentUserId();
      if (!userId) {
        submitStatus = "id\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.";
        renderSubmitStatus();
        showToast("no", submitStatus);
        return;
      }

      isSubmitting = true;
      submitStatus = "\uC81C\uCD9C \uC911...";
      renderSubmitStatus();

      try {
        const txtContent = buildSubmissionText(userId);
        const file = new File(
          [txtContent],
          `imsi_bitnalee_hw_3_${userId}.txt`,
          { type: "text/plain" }
        );

        const formData = new FormData();
        formData.append("UserId", userId);
        formData.append("Subcategory", DIRECT_SUBCATEGORY);
        formData.append("HWType", DIRECT_HWTYPE);
        formData.append("LessonNo", 0);
        formData.append("Comment", DIRECT_COMMENT);
        formData.append("HWImage", file);

        const res = await fetch(HWPLUS_API_URL, {
          method: "POST",
          body: formData
        });
        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(result && result.message ? String(result.message) : String(res.status));
        }

        submitStatus = "\uC81C\uCD9C \uD655\uC778 \uC911...";
        renderSubmitStatus();

        const confirmed = await waitForServerSubmission(userId);
        if (!confirmed) {
          clearSubmitMarker();
          submittedToday = false;
          submitStatus = "\uC81C\uCD9C \uC2E4\uD328";
          renderSubmitStatus();
          showToast("no", submitStatus);
          return;
        }

        writeSubmitMarker(userId, getKstTodayString());
        submittedToday = true;
        submitStatus = "\uC81C\uCD9C \uC644\uB8CC!";
        renderSubmitStatus();
        showToast("ok", submitStatus);
        setTimeout(() => {
          window.location.replace(buildTrayUrl());
        }, 620);
      } catch (err) {
        console.error(err);
        submitStatus = "\uC81C\uCD9C \uC2E4\uD328";
        renderSubmitStatus();
        showToast("no", submitStatus);
      } finally {
        isSubmitting = false;
        renderSubmitStatus();
      }
    }
    function renderMC() {
      const container = document.getElementById("mcContainer");
      container.innerHTML = "";

      mcQuestions.forEach((q, i) => {
        const card = document.createElement("article");
        card.className = "card";

        const choiceHTML = q.choices.map((choice, idx) => `
          <label class="choice" id="mcLabel${i}_${idx}">
            <input 
              type="radio" 
              name="mc${i}" 
              value="${idx}" 
              onchange="checkOneMC(${i})"
            >
            <span>${idx + 1}. ${choice}</span>
          </label>
        `).join("");

        card.innerHTML = `
          <span class="qnum">${i + 1}</span>
          <div class="sentence">${q.sentence.replace("____", '<span class="blank"></span>')}</div>
          <div class="meaning">${q.meaning}</div>
          <div class="choices">${choiceHTML}</div>
          <div id="mcResult${i}" class="result"></div>
        `;

        container.appendChild(card);
      });
    }

    function checkOneMC(index) {
      const selected = document.querySelector(`input[name="mc${index}"]:checked`);
      const result = document.getElementById(`mcResult${index}`);

      if (!selected) return false;

      const chosen = Number(selected.value);
      const answer = mcQuestions[index].answer;

      if (chosen === answer) {
        result.innerHTML = `<span class="correct">정답</span>`;
        document.getElementById(`mcLabel${index}_${chosen}`).classList.add("selected-correct");
      } else {
        result.innerHTML = `<span class="wrong">오답</span>`;
        document.getElementById(`mcLabel${index}_${chosen}`).classList.add("selected-wrong");
      }

      document.querySelectorAll(`input[name="mc${index}"]`).forEach(input => {
        input.disabled = true;
      });

      mcQuestions[index].choices.forEach((_, idx) => {
        document.getElementById(`mcLabel${index}_${idx}`).classList.add("locked");
      });

      updateMCScore();
      return chosen === answer;
    }

    function updateMCScore() {
      let answered = 0;
      let correct = 0;

      mcQuestions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="mc${i}"]:checked`);
        if (!selected) return;

        answered++;

        if (Number(selected.value) === q.answer) {
          correct++;
        }
      });

      document.getElementById("mcScore").textContent =
        `선다형 점수: ${correct} / ${answered} 완료`;
    }

    function renderWriting(type, data, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      data.forEach((q, i) => {
        const card = document.createElement("article");
        card.className = "writing-card";

        const conditionHTML = q.condition
          ? `<div class="condition">조건: ${q.condition}</div>`
          : "";

        card.innerHTML = `
          <span class="qnum">${i + 1}</span>
          <div class="sentence">${q.sentence.replace("____", '<span class="blank"></span>')}</div>
          <div class="meaning">${q.meaning}</div>
          ${conditionHTML}
          <div class="writing-row">
            <input class="text-answer" id="${type}Input${i}" placeholder="정답을 입력하세요">
          </div>
          <div class="mini-actions">
            <button id="${type}Btn${i}" onclick="checkOneWriting('${type}', ${i})">채점</button>
          </div>
          <div id="${type}Result${i}" class="result"></div>
        `;

        container.appendChild(card);
      });
    }

    function normalize(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[?.!,]/g, "")
        .replace(/\s+/g, " ");
    }

    function getWritingData(type) {
      return type === "direct" ? directQuestions : conditionQuestions;
    }

    function checkOneWriting(type, index) {
      const data = getWritingData(type);
      const input = document.getElementById(`${type}Input${index}`);
      const result = document.getElementById(`${type}Result${index}`);
      const btn = document.getElementById(`${type}Btn${index}`);

      const user = normalize(input.value);
      const answers = data[index].answers.map(normalize);

      input.classList.remove("ok", "no");

      if (!user) {
        result.innerHTML = `<span class="wrong">미응답</span>`;
        input.classList.add("no");
        return false;
      }

      const isCorrect = answers.includes(user);

      if (isCorrect) {
        result.innerHTML = `<span class="correct">정답</span>`;
        input.classList.add("ok");
      } else {
        result.innerHTML = `<span class="wrong">오답</span>`;
        input.classList.add("no");
      }

      input.disabled = true;
      btn.disabled = true;

      return isCorrect;
    }

    function gradeWriting(type) {
      const data = getWritingData(type);
      let score = 0;

      data.forEach((_, i) => {
        const input = document.getElementById(`${type}Input${i}`);
        const result = document.getElementById(`${type}Result${i}`);
        const btn = document.getElementById(`${type}Btn${i}`);

        if (input.disabled) {
          if (input.classList.contains("ok")) score++;
          return;
        }

        if (!normalize(input.value)) {
          result.innerHTML = `<span class="wrong">미응답</span>`;
          input.classList.add("no");
          input.disabled = true;
          btn.disabled = true;
          return;
        }

        if (checkOneWriting(type, i)) score++;
      });

      const scoreId = type === "direct" ? "directScore" : "conditionScore";
      const btnId = type === "direct" ? "directAllBtn" : "conditionAllBtn";

      document.getElementById(scoreId).textContent = `점수: ${score} / ${data.length}`;
      document.getElementById(btnId).disabled = true;
    }

    renderMC();
    renderWriting("direct", directQuestions, "directContainer");
    renderWriting("condition", conditionQuestions, "conditionContainer");

    document.getElementById("submitBtn").addEventListener("click", submitAllAnswers);

    (async function initSubmitState() {
      submittedToday = await checkSubmittedToday();
      if (submittedToday) {
        submitStatus = "\uC624\uB298\uC740 \uC774\uBBF8 \uC81C\uCD9C\uD588\uC2B5\uB2C8\uB2E4.";
      }
      renderSubmitStatus();
    })();
  </script>
