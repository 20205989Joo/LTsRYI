<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chunk Click Bank</title>
<style>
  :root{
    --panel:#121821;
    --card:#151d28;
    --muted:#7b8a9a;
    --text:#e7edf5;
    --accent:#8fd3ff;
    --ok:#5dd39e;
    --warn:#ff9d76;
    --yellow:#ffd54d;
    --purple:#a78bfa;
    --br:16px;
    --shadow:0 10px 30px rgba(0,0,0,.25);
    --gap:14px;
  }

  *{box-sizing:border-box}

  html,body{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
  }

  body{
    background:
      radial-gradient(circle at 20% 20%, rgba(143,211,255,.08), transparent 28%),
      radial-gradient(circle at 80% 70%, rgba(167,139,250,.08), transparent 32%),
      linear-gradient(120deg,#0a1017,#0b1220 50%,#0a1017);
    color:var(--text);
    font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,Helvetica,Arial,sans-serif;
  }

  .wrap{
    width:100%;
    height:100dvh;
    max-width:1200px;
    margin:0 auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  header{
    flex:0 0 38px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  .title{
    font-size:21px;
    font-weight:850;
    letter-spacing:.2px;
  }

  .progress{
    font-weight:800;
    color:#cfeeff;
    font-size:14px;
    white-space:nowrap;
  }

  .grid{
    flex:1 1 auto;
    min-height:0;
    display:grid;
    grid-template-columns:minmax(0,1.05fr) minmax(360px,.95fr);
    gap:var(--gap);
  }

  .panel{
    min-height:0;
    background:var(--panel);
    border-radius:var(--br);
    box-shadow:var(--shadow);
    padding:14px;
    overflow:hidden;
  }

  .left-panel{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .top-row{
    flex:0 0 auto;
    min-height:36px;
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }

  .controls{
    display:flex;
    gap:8px;
    align-items:center;
  }

  .btn{
    appearance:none;
    border:1px solid #223042;
    background:#101722;
    color:var(--text);
    padding:7px 11px;
    border-radius:10px;
    font-weight:750;
    cursor:pointer;
    white-space:nowrap;
  }

  .btn:hover{border-color:#2f4157}

  .btn.primary{
    border-color:#2f5f7d;
    background:#102236;
    color:#cfeeff;
  }

  .btn.ok{
    border-color:#226046;
    background:#0e2018;
    color:#baf5d8;
  }

  .btn.submit{
    border-color:#6f5db7;
    background:#17122a;
    color:#ddd6fe;
  }

  .btn:disabled{
    opacity:.58;
    cursor:not-allowed;
  }

  .toast{
    color:var(--warn);
    font-size:13px;
    min-width:100px;
    text-align:right;
  }

  .dict-panel{
    flex:0 0 0;
    height:0;
    overflow:hidden;
    background:#0f1621;
    border:0 solid #26374d;
    border-radius:14px;
    transition:height .2s ease, flex-basis .2s ease, border-width .2s ease;
  }

  .dict-panel.open{
    flex:0 0 250px;
    height:250px;
    border-width:1px;
  }

  .dict-head{
    height:32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 10px;
    border-bottom:1px solid #26374d;
    color:#cfeeff;
    font-size:13px;
    font-weight:800;
  }

  .dict-close{
    border:0;
    background:transparent;
    color:#cfeeff;
    font-size:20px;
    line-height:1;
    cursor:pointer;
    padding:0 4px;
  }

  #dictFrame{
    width:100%;
    height:calc(100% - 32px);
    border:0;
    display:block;
    background:white;
  }

  .card{
    flex:0 0 145px;
    height:145px;
    background:var(--card);
    border:2px solid var(--yellow);
    border-radius:14px;
    padding:16px;
    position:relative;
    display:flex;
    align-items:center;
    box-shadow:
      0 0 0 2px rgba(255,213,77,.15) inset,
      0 0 16px rgba(255,213,77,.35),
      0 0 40px rgba(255,213,77,.2);
  }

  .card .status{
    position:absolute;
    right:10px;
    top:8px;
    font-size:12px;
    color:var(--muted);
  }

  .card[data-solved="true"]{
    box-shadow:
      0 0 0 2px rgba(93,211,158,.18) inset,
      0 0 18px rgba(93,211,158,.35),
      0 0 44px rgba(93,211,158,.18);
  }

  .card[data-solved="true"] .status{color:var(--ok)}

  .tokens{
    width:100%;
    line-height:1.9;
    word-wrap:anywhere;
    font-size:20px;
    color:var(--yellow);
  }

  .token{
    padding:2px 4px;
    border-radius:8px;
    cursor:pointer;
    transition:background .18s,transform .1s,color .18s;
    display:inline-block;
    margin:0 1px;
  }

  .token:hover{background:#1a2533}

  .token[data-found="true"]{
    background:rgba(93,211,158,.15);
    color:#b9f5d7;
  }

  .token.wrong{
    background:rgba(255,107,107,.16);
    transform:translateY(-1px);
  }

  .shake{animation:shake .3s}

  @keyframes shake{
    10%,90%{transform:translateX(-1px)}
    20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-4px)}
    40%,60%{transform:translateX(4px)}
  }

  .mini-card{
    flex:0 0 50px;
    height:50px;
    background:#101722;
    border:1px solid var(--purple);
    border-radius:12px;
    padding:7px 11px;
    overflow:hidden;
    box-shadow:
      0 0 10px rgba(167,139,250,.18) inset,
      0 0 16px rgba(167,139,250,.22);
  }

  .mini-card .head{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:850;
    color:#c4b5fd;
    font-size:14px;
    line-height:1.2;
    margin-bottom:2px;
  }

  .mini-card .desc{
    font-size:13px;
    color:#e7edf5;
    line-height:1.25;
  }

  .mini-card .tag{
    font-size:11px;
    color:#c4b5fd;
    border:1px solid var(--purple);
    border-radius:8px;
    padding:0 6px;
  }

  .student-box{
    flex:0 0 72px;
    height:72px;
    background:#0f1621;
    border:1px solid #26374d;
    border-radius:14px;
    padding:9px;
  }

  .student-row{
    display:flex;
    gap:8px;
    align-items:stretch;
  }

  textarea{
    flex:0 0 430px;
    width:430px;
    height:42px;
    min-height:42px;
    max-height:42px;
    resize:none;
    border:1px solid #31445c;
    background:#0b111a;
    color:var(--text);
    border-radius:12px;
    padding:6px 9px;
    font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,Helvetica,Arial,sans-serif;
    outline:none;
  }

  textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(143,211,255,.1);
  }

  .save-wrap{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:72px;
  }

  .save-wrap .btn{
    height:42px;
  }

  .saved-state{
    font-size:11px;
    color:var(--muted);
    text-align:center;
    line-height:1;
  }

  .bank{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .bank-head{
    flex:0 0 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .bank-head h2{
    margin:0;
    font-size:16px;
  }

  ul.bank-list{
    flex:1 1 auto;
    min-height:0;
    list-style:none;
    margin:0;
    padding:0;
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:7px;
    align-content:start;
  }

  .bank-item{
    display:flex;
    min-width:0;
  }

  .bank-item button{
    flex:1;
    min-width:0;
    text-align:left;
    border:1px solid #243347;
    background:#0f1621;
    color:var(--text);
    border-radius:10px;
    padding:8px 9px;
    cursor:pointer;
    font-weight:750;
    font-size:13px;
    line-height:1.25;
  }

  .bank-item button small{
    color:var(--muted);
    font-size:12px;
    font-weight:650;
  }

  .bank-item button.active{
    outline:2px solid var(--accent);
  }

  .bank-item button.used{
    background:#0e1b15;
    border-color:#1f4836;
    color:#a7e7c9;
  }

  @media (max-width:980px){
    html,body{
      overflow:auto;
    }

    .wrap{
      height:auto;
      min-height:100dvh;
    }

    .grid{
      grid-template-columns:1fr;
    }

    textarea{
      flex:1 1 auto;
      width:100%;
    }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">Chunk Click Bank</div>
      <div class="progress" id="progress">클릭 완료: 0 / 20 · 저장: 0 / 20</div>
    </header>

    <main class="grid">
      <section class="panel left-panel">
        <div class="top-row">
          <div class="controls">
            <button class="btn" id="prevBtn" type="button">이전</button>
            <button class="btn" id="nextBtn" type="button">다음</button>
            <button class="btn primary" id="openDictBtn" type="button">영영사전</button>
          </div>
          <span class="toast" id="toast" aria-live="polite"></span>
        </div>

        <div class="dict-panel" id="dictPanel">
          <div class="dict-head">
            <span>네이버 영영사전</span>
            <button class="dict-close" id="closeDictBtn" type="button">×</button>
          </div>
          <iframe
            id="dictFrame"
            title="Naver English Dictionary"
            src="about:blank"
          ></iframe>
        </div>

        <div class="card" id="card" data-solved="false">
          <div class="status" id="status">0/0</div>
          <div class="tokens" id="tokens"></div>
        </div>

        <div id="glossArea"></div>

        <div class="student-box">
          <div class="student-row">
            <textarea id="studentAnswer" placeholder="직접 입력"></textarea>
            <div class="save-wrap">
              <button class="btn ok" id="saveBtn" type="button">저장</button>
              <div class="saved-state" id="savedState">저장 전</div>
            </div>
          </div>
        </div>
      </section>

      <aside class="panel bank">
        <div class="bank-head">
          <h2>Bank</h2>
        </div>

        <ul class="bank-list" id="bank">
          <li class="bank-item"><button type="button" data-key="not_only_but_also">not only A <small>but also</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="replace_with">replace A <small>with</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="provide_with">provide A <small>with</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="prefer_to">prefer A <small>to</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="regard_as">regard A <small>as</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="turn_into">turn A <small>into</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="distinguish_from">distinguish A <small>from</small> B</button></li>
          <li class="bank-item"><button type="button" data-key="compare_with">compare A <small>with</small> B</button></li>

          <li class="bank-item"><button type="button" data-key="prevent_from_ing">prevent A from ~ing</button></li>
          <li class="bank-item"><button type="button" data-key="keep_from_ing">keep A from ~ing</button></li>
          <li class="bank-item"><button type="button" data-key="be_supposed_to">be supposed to V</button></li>
          <li class="bank-item"><button type="button" data-key="have_difficulty_ing">have difficulty ~ing</button></li>
          <li class="bank-item"><button type="button" data-key="in_order_to">in order to V</button></li>
          <li class="bank-item"><button type="button" data-key="be_willing_to">be willing to V</button></li>
          <li class="bank-item"><button type="button" data-key="be_capable_of">be capable of ~ing</button></li>
          <li class="bank-item"><button type="button" data-key="make_it_possible_to">make it possible to V</button></li>
          <li class="bank-item"><button type="button" data-key="be_concerned_about">be concerned about</button></li>
          <li class="bank-item"><button type="button" data-key="contribute_to">contribute to</button></li>
          <li class="bank-item"><button type="button" data-key="deal_with">deal with</button></li>
          <li class="bank-item"><button type="button" data-key="be_familiar_with">be familiar with</button></li>
        </ul>
      </aside>
    </main>
  </div>

<script>
(function(){
  const STORAGE_KEY = 'chunk_click_student_answers_clean_v2';
  const HWPLUS_API_URL = "https://port-0-ltryi-database-1ru12mlw3glz2u.sel5.cloudtype.app/api/saveHWPlus";
  const SUBMIT_MARKER_KEY = 'imsi_hw_4_submit_marker_v1';
  const DIRECT_SUBCATEGORY = "\uACF5\uC0AC\uC911";
  const DIRECT_HWTYPE = "doneinweb";
  const DIRECT_COMMENT = "imsi_hw_4 chunk click bank answers";

  const PROBLEMS = [
    {
      key:'not_only_but_also',
      label:'not only A but also B',
      gloss:'A뿐만 아니라 B도',
      tokens:['Not','only','the','students','but','also','their','parents','joined','the','event','.'],
      targets:[0,1,4,5]
    },
    {
      key:'replace_with',
      label:'replace A with B',
      gloss:'A를 B로 대체하다',
      tokens:['You','can','replace','butter','with','olive','oil','in','this','recipe','.'],
      targets:[2,4]
    },
    {
      key:'provide_with',
      label:'provide A with B',
      gloss:'A에게 B를 제공하다',
      tokens:['The','program','provides','students','with','useful','feedback','.'],
      targets:[2,4]
    },
    {
      key:'prefer_to',
      label:'prefer A to B',
      gloss:'B보다 A를 선호하다',
      tokens:['Many','people','prefer','text','messages','to','phone','calls','.'],
      targets:[2,5]
    },
    {
      key:'regard_as',
      label:'regard A as B',
      gloss:'A를 B로 여기다',
      tokens:['Some','readers','regard','the','book','as','a','masterpiece','.'],
      targets:[2,5]
    },
    {
      key:'turn_into',
      label:'turn A into B',
      gloss:'A를 B로 바꾸다',
      tokens:['The','artist','turned','old','boxes','into','beautiful','furniture','.'],
      targets:[2,5]
    },
    {
      key:'distinguish_from',
      label:'distinguish A from B',
      gloss:'A와 B를 구별하다',
      tokens:['It','is','hard','to','distinguish','fact','from','opinion','online','.'],
      targets:[4,6]
    },
    {
      key:'compare_with',
      label:'compare A with B',
      gloss:'A를 B와 비교하다',
      tokens:['The','teacher','compared','the','answer','with','the','model','sentence','.'],
      targets:[2,5]
    },
    {
      key:'prevent_from_ing',
      label:'prevent A from ~ing',
      gloss:'A가 ~하지 못하게 하다',
      tokens:['These','rules','prevent','drivers','from','parking','near','the','gate','.'],
      targets:[2,4]
    },
    {
      key:'keep_from_ing',
      label:'keep A from ~ing',
      gloss:'A가 ~하지 못하게 하다',
      tokens:['A','clear','plan','can','keep','you','from','wasting','time','.'],
      targets:[4,6]
    },
    {
      key:'be_supposed_to',
      label:'be supposed to V',
      gloss:'~하기로 되어 있다 / ~해야 한다',
      tokens:['You','are','supposed','to','submit','the','report','by','Friday','.'],
      targets:[1,2,3]
    },
    {
      key:'have_difficulty_ing',
      label:'have difficulty ~ing',
      gloss:'~하는 데 어려움을 겪다',
      tokens:['Many','students','have','difficulty','understanding','long','sentences','.'],
      targets:[2,3]
    },
    {
      key:'in_order_to',
      label:'in order to V',
      gloss:'~하기 위해서',
      tokens:['He','saved','money','in','order','to','buy','a','new','laptop','.'],
      targets:[3,4,5]
    },
    {
      key:'be_willing_to',
      label:'be willing to V',
      gloss:'기꺼이 ~하다',
      tokens:['They','are','willing','to','help','new','members','.'],
      targets:[1,2,3]
    },
    {
      key:'be_capable_of',
      label:'be capable of ~ing',
      gloss:'~할 능력이 있다',
      tokens:['This','machine','is','capable','of','producing','clean','energy','.'],
      targets:[2,3,4]
    },
    {
      key:'make_it_possible_to',
      label:'make it possible to V',
      gloss:'~하는 것을 가능하게 하다',
      tokens:['The','tool','makes','it','possible','to','analyze','texts','quickly','.'],
      targets:[2,3,4,5]
    },
    {
      key:'be_concerned_about',
      label:'be concerned about',
      gloss:'~에 대해 걱정하다 / 관심을 가지다',
      tokens:['Parents','are','concerned','about','their','children’s','safety','.'],
      targets:[1,2,3]
    },
    {
      key:'contribute_to',
      label:'contribute to',
      gloss:'~에 기여하다 / 원인이 되다',
      tokens:['Regular','exercise','contributes','to','better','sleep','.'],
      targets:[2,3]
    },
    {
      key:'deal_with',
      label:'deal with',
      gloss:'~을 다루다 / 처리하다',
      tokens:['We','need','to','deal','with','the','problem','calmly','.'],
      targets:[3,4]
    },
    {
      key:'be_familiar_with',
      label:'be familiar with',
      gloss:'~에 익숙하다 / ~을 잘 알다',
      tokens:['Most','students','are','familiar','with','basic','grammar','rules','.'],
      targets:[2,3,4]
    }
  ];

  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));

  const toast = $('#toast');
  const progress = $('#progress');
  const card = $('#card');
  const tokensBox = $('#tokens');
  const status = $('#status');
  const prevBtn = $('#prevBtn');
  const nextBtn = $('#nextBtn');
  const bankButtons = $$('#bank button[data-key]');
  const glossArea = $('#glossArea');
  const studentAnswer = $('#studentAnswer');
  const saveBtn = $('#saveBtn');
  const savedState = $('#savedState');
  const openDictBtn = $('#openDictBtn');
  const dictPanel = $('#dictPanel');
  const dictFrame = $('#dictFrame');
  const closeDictBtn = $('#closeDictBtn');

  let order = [...PROBLEMS.keys()];
  shuffle(order);

  let idx = 0;
  let activeKey = null;
  let solvedMap = loadSolved();
  let answerMap = loadAnswers();
  let foundSet = new Set();
  let submittedToday = false;
  let isSubmitting = false;
  let isCheckingSubmission = true;

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
  }

  function currentProblem(){
    return PROBLEMS[order[idx]];
  }

  function setToast(msg, color){
    toast.textContent = msg || '';
    toast.style.color = color || 'var(--warn)';
    if(msg){
      toast.classList.add('shake');
      setTimeout(()=>toast.classList.remove('shake'),280);
    }
  }

  function getCurrentUserId(){
    try{
      return String(new URLSearchParams(window.location.search || '').get('id') || '').trim();
    }catch(_){
      return '';
    }
  }

  function getKstTodayString(){
    const now = new Date(Date.now() + (9 * 60 * 60 * 1000));
    return now.toISOString().slice(0,10);
  }

  function readSubmitMarker(){
    try{
      const raw = localStorage.getItem(SUBMIT_MARKER_KEY);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      return parsed && typeof parsed === 'object' ? parsed : null;
    }catch(_){
      return null;
    }
  }

  function writeSubmitMarker(userId, dateStr){
    localStorage.setItem(SUBMIT_MARKER_KEY, JSON.stringify({
      userId:String(userId || ''),
      date:String(dateStr || '')
    }));
  }

  function clearSubmitMarker(){
    localStorage.removeItem(SUBMIT_MARKER_KEY);
  }

  function hasLocalSubmittedToday(userId){
    const marker = readSubmitMarker();
    if(!marker) return false;
    return String(marker.userId || '') === String(userId || '') && String(marker.date || '') === getKstTodayString();
  }

  async function fetchSubmittedTodayFromServer(userId){
    const res = await fetch(`${HWPLUS_API_URL.replace('/saveHWPlus','/getHWPlus')}?userId=${encodeURIComponent(userId)}`);
    if(!res.ok) throw new Error(String(res.status));

    const data = await res.json();
    if(!Array.isArray(data)) return false;

    const todayStr = getKstTodayString();
    return data.some(item=>{
      const timestamp = String(item.Timestamp || item.timestamp || '');
      const subcategory = String(item.Subcategory || item.subcategory || '').trim();
      const hwType = String(item.HWType || item.hwtype || '').trim();
      const comment = String(item.Comment || item.comment || '').trim();
      return timestamp.startsWith(todayStr) &&
        subcategory === DIRECT_SUBCATEGORY &&
        hwType === DIRECT_HWTYPE &&
        comment === DIRECT_COMMENT;
    });
  }

  function wait(ms){
    return new Promise(resolve=>setTimeout(resolve, ms));
  }

  async function waitForServerSubmission(userId, attempts=4, delayMs=450){
    for(let i=0;i<attempts;i+=1){
      try{
        if(await fetchSubmittedTodayFromServer(userId)) return true;
      }catch(_){
      }

      if(i < attempts - 1) await wait(delayMs);
    }
    return false;
  }

  async function checkSubmittedToday(){
    const userId = getCurrentUserId();
    if(!userId) return false;

    const hasLocalMarker = hasLocalSubmittedToday(userId);
    try{
      const hasServerRecord = await fetchSubmittedTodayFromServer(userId);
      if(hasServerRecord){
        if(!hasLocalMarker) writeSubmitMarker(userId, getKstTodayString());
        return true;
      }
      if(hasLocalMarker) clearSubmitMarker();
      return false;
    }catch(_){
      return hasLocalMarker;
    }
  }

  function buildTrayUrl(){
    const userId = getCurrentUserId();
    const target = new URL('homework-tray_v1.html', window.location.href);
    if(userId) target.searchParams.set('id', userId);
    return target.toString();
  }

  function completedClickCount(){
    return Object.values(solvedMap).filter(Boolean).length;
  }

  function filledAnswerCount(){
    return PROBLEMS.filter(p => (answerMap[p.key] || '').trim()).length;
  }

  function isLastProblem(){
    return idx === order.length - 1;
  }

  function renderSubmitStatus(){
    if(!saveBtn) return;
    const last = isLastProblem();
    saveBtn.classList.toggle('submit', last && !submittedToday);
    saveBtn.classList.toggle('ok', !last && !submittedToday);
    saveBtn.disabled = submittedToday || isSubmitting || (last && isCheckingSubmission);
    if(submittedToday){
      saveBtn.textContent = "\uC81C\uCD9C \uC644\uB8CC";
    }else if(isSubmitting){
      saveBtn.textContent = "\uC81C\uCD9C \uC911...";
    }else if(last && isCheckingSubmission){
      saveBtn.textContent = "\uD655\uC778 \uC911...";
    }else if(last){
      saveBtn.textContent = "\uC81C\uCD9C";
    }else{
      saveBtn.textContent = "\uC800\uC7A5";
    }
  }

  function summarizeLabels(labels){
    const shown = labels.slice(0, 3).join(', ');
    const rest = labels.length - 3;
    return rest > 0 ? `${shown} \uC678 ${rest}\uAC1C` : shown;
  }

  function getMissingSubmissionItems(){
    return {
      missingClicks: PROBLEMS.filter(p => !solvedMap[p.key]).map(p => p.label),
      missingAnswers: PROBLEMS.filter(p => !(answerMap[p.key] || '').trim()).map(p => p.label)
    };
  }

  function showMissingSubmissionNotice(){
    const missing = getMissingSubmissionItems();
    const parts = [];
    if(missing.missingClicks.length){
      parts.push(`\uD074\uB9AD \uC548 \uD568: ${summarizeLabels(missing.missingClicks)}`);
    }
    if(missing.missingAnswers.length){
      parts.push(`\uBE48\uCE78: ${summarizeLabels(missing.missingAnswers)}`);
    }
    if(parts.length === 0) return false;
    setToast(parts.join(' / '));
    return true;
  }

  function buildSubmissionText(userId){
    const lines = [
      `userId: ${userId}`,
      `date: ${getKstTodayString()}`,
      'source: imsi_hw_4.html',
      `clickedChunks: ${completedClickCount()} / ${PROBLEMS.length}`,
      `filledAnswers: ${filledAnswerCount()} / ${PROBLEMS.length}`,
      ''
    ];

    PROBLEMS.forEach((p, problemIndex)=>{
      const answer = String(answerMap[p.key] || '').trim();
      const clicked = !!solvedMap[p.key];
      const targetText = p.targets.map(tokenIndex => p.tokens[tokenIndex]).join(' ');
      lines.push(`[problem ${problemIndex + 1}]`);
      lines.push(`chunk: ${p.label}`);
      lines.push(`gloss: ${p.gloss}`);
      lines.push(`sentence: ${p.tokens.join(' ')}`);
      lines.push(`targetTokens: ${targetText}`);
      lines.push(`clicked: ${clicked ? 'yes' : 'no'}`);
      lines.push(`studentAnswer: ${answer || '\uBBF8\uC751\uB2F5'}`);
      lines.push('');
    });

    return lines.join('\n');
  }

  async function submitAllAnswers(){
    if(isSubmitting) return;
    if(submittedToday){
      setToast("\uC624\uB298\uC740 \uC774\uBBF8 \uC81C\uCD9C\uD588\uC2B5\uB2C8\uB2E4.");
      return;
    }

    saveCurrentAnswer(true);

    if(showMissingSubmissionNotice()){
      return;
    }

    const userId = getCurrentUserId();
    if(!userId){
      setToast("id\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.");
      return;
    }

    isSubmitting = true;
    renderSubmitStatus();
    setToast("\uC81C\uCD9C \uC911...", 'var(--accent)');

    try{
      const txtContent = buildSubmissionText(userId);
      const file = new File(
        [txtContent],
        `imsi_hw_4_${userId}.txt`,
        { type:'text/plain' }
      );

      const formData = new FormData();
      formData.append('UserId', userId);
      formData.append('Subcategory', DIRECT_SUBCATEGORY);
      formData.append('HWType', DIRECT_HWTYPE);
      formData.append('LessonNo', 0);
      formData.append('Comment', DIRECT_COMMENT);
      formData.append('HWImage', file);

      const res = await fetch(HWPLUS_API_URL, {
        method:'POST',
        body:formData
      });
      const result = await res.json().catch(() => ({}));

      if(!res.ok){
        throw new Error(result && result.message ? String(result.message) : String(res.status));
      }

      setToast("\uC81C\uCD9C \uD655\uC778 \uC911...", 'var(--accent)');

      const confirmed = await waitForServerSubmission(userId);
      if(!confirmed){
        clearSubmitMarker();
        submittedToday = false;
        setToast("\uC81C\uCD9C \uC2E4\uD328");
        return;
      }

      writeSubmitMarker(userId, getKstTodayString());
      submittedToday = true;
      renderSubmitStatus();
      setToast("\uC81C\uCD9C \uC644\uB8CC!", 'var(--ok)');
      setTimeout(()=>{
        window.location.replace(buildTrayUrl());
      }, 620);
    }catch(err){
      console.error(err);
      setToast("\uC81C\uCD9C \uC2E4\uD328");
    }finally{
      isSubmitting = false;
      renderSubmitStatus();
    }
  }

  function updateProgress(){
    const solved = Object.values(solvedMap).filter(Boolean).length;
    const written = PROBLEMS.filter(p => (answerMap[p.key] || '').trim()).length;
    progress.textContent = `클릭 완료: ${solved} / ${PROBLEMS.length} · 저장: ${written} / ${PROBLEMS.length}`;
  }

  function setActiveBank(btn){
    bankButtons.forEach(b=>b.classList.remove('active'));
    if(btn){
      btn.classList.add('active');
      activeKey = btn.dataset.key;
    }
  }

  bankButtons.forEach(btn=>{
    btn.addEventListener('click',()=>{
      setActiveBank(btn);
      setToast('');
      renderGloss();
    });
  });

  function renderCard(){
    const p = currentProblem();
    const isSolved = !!solvedMap[p.key];

    card.dataset.solved = isSolved ? 'true' : 'false';
    foundSet = new Set();
    tokensBox.innerHTML = '';

    p.tokens.forEach((tok,i)=>{
      const span = document.createElement('span');
      span.className = 'token';
      span.textContent = tok;
      span.dataset.idx = i;
      span.dataset.target = String(p.targets.includes(i));
      span.setAttribute('role','button');
      span.setAttribute('tabindex','0');

      if(isSolved && p.targets.includes(i)){
        span.dataset.found = 'true';
        foundSet.add(i);
      }

      span.addEventListener('click',()=>onTokenClick(span));

      span.addEventListener('keydown',e=>{
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          onTokenClick(span);
        }
      });

      tokensBox.appendChild(span);

      if(!/[.,!?;:]/.test(tok)){
        tokensBox.appendChild(document.createTextNode(' '));
      }
    });

    studentAnswer.value = answerMap[p.key] || '';
    savedState.textContent = studentAnswer.value.trim() ? '저장됨' : '저장 전';

    updateStatus();
    glossArea.innerHTML = '';
  }

  function updateStatus(){
    const p = currentProblem();
    const need = p.targets.length;
    const found = $$('#tokens .token[data-found="true"]').length;
    status.textContent = `${found}/${need}`;
  }

  function onTokenClick(span){
    const p = currentProblem();

    if(card.dataset.solved === 'true') return;

    if(!activeKey){
      setToast('Bank 먼저');
      card.classList.add('shake');
      setTimeout(()=>card.classList.remove('shake'),280);
      return;
    }

    if(activeKey !== p.key){
      span.classList.add('wrong');
      setTimeout(()=>span.classList.remove('wrong'),220);
      setToast('다른 chunk');
      return;
    }

    if(span.dataset.target !== 'true'){
      span.classList.add('wrong');
      setTimeout(()=>span.classList.remove('wrong'),220);
      setToast('해당 단어 아님');
      return;
    }

    if(span.dataset.found === 'true') return;

    span.dataset.found = 'true';
    foundSet.add(Number(span.dataset.idx));
    updateStatus();

    if(foundSet.size >= p.targets.length){
      card.dataset.solved = 'true';
      solvedMap[p.key] = true;
      localStorage.setItem(STORAGE_KEY + '_solved', JSON.stringify(solvedMap));

      const btn = bankButtons.find(b=>b.dataset.key === p.key);
      if(btn) btn.classList.add('used');

      updateProgress();
      renderGloss();
      setToast('정답','var(--ok)');
    }
  }

  function renderGloss(){
    glossArea.innerHTML = '';

    if(!activeKey) return;

    const p = PROBLEMS.find(x=>x.key === activeKey);
    if(!p) return;

    const mini = document.createElement('div');
    mini.className = 'mini-card';
    mini.innerHTML = `
      <div class="head">
        <span class="tag">CHUNK</span>
        ${escapeHtml(p.label)}
      </div>
      <div class="desc">${escapeHtml(p.gloss)}</div>
    `;
    glossArea.appendChild(mini);
  }

  function saveCurrentAnswer(silent=false){
    const p = currentProblem();
    answerMap[p.key] = studentAnswer.value;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(answerMap));
    savedState.textContent = '저장됨';
    updateProgress();

    if(!silent){
      setToast('저장됨','var(--ok)');
    }
  }

  function loadAnswers(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    }catch(e){
      return {};
    }
  }

  function loadSolved(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY + '_solved');
      return raw ? JSON.parse(raw) : {};
    }catch(e){
      return {};
    }
  }

  function go(delta){
    saveCurrentAnswer(true);

    idx = (idx + delta + order.length) % order.length;

    activeKey = null;
    bankButtons.forEach(b=>b.classList.remove('active'));
    glossArea.innerHTML = '';

    renderCard();
    markUsedBankItems();
    renderSubmitStatus();
    setToast('');
  }

  function saveAndGoNext(){
    if(isLastProblem()){
      submitAllAnswers();
      return;
    }
    go(1);
    setToast("\uC800\uC7A5\uB410\uC2B5\uB2C8\uB2E4", 'var(--ok)');
  }

  function openNaverDict(){
    dictPanel.classList.add('open');

    if(dictFrame.getAttribute('src') === 'about:blank'){
      dictFrame.setAttribute('src', 'https://en.dict.naver.com/');
    }

    setToast('');
  }

  function closeNaverDict(){
    dictPanel.classList.remove('open');
  }

  function markUsedBankItems(){
    bankButtons.forEach(btn=>{
      if(solvedMap[btn.dataset.key]){
        btn.classList.add('used');
      }else{
        btn.classList.remove('used');
      }
    });
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  prevBtn.addEventListener('click',()=>go(-1));
  nextBtn.addEventListener('click',()=>go(1));
  saveBtn.addEventListener('click',saveAndGoNext);
  openDictBtn.addEventListener('click',openNaverDict);
  closeDictBtn.addEventListener('click',closeNaverDict);

  studentAnswer.addEventListener('input',()=>{
    savedState.textContent = '수정됨';
  });

  window.addEventListener('beforeunload',()=>{
    saveCurrentAnswer(true);
  });

  updateProgress();
  renderCard();
  markUsedBankItems();
  renderSubmitStatus();

  (async function bootSubmitState(){
    submittedToday = await checkSubmittedToday();
    isCheckingSubmission = false;
    if(submittedToday){
      setToast("\uC624\uB298\uC740 \uC774\uBBF8 \uC81C\uCD9C\uD588\uC2B5\uB2C8\uB2E4.", 'var(--ok)');
    }
    renderSubmitStatus();
  })();
})();
</script>
