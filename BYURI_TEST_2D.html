<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벼리 황무지 디펜스 2D</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#2f252b;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eefcff}
#game{display:block;width:100vw;height:100vh;background:radial-gradient(circle at center,#665158 0%,#4d3e45 48%,#342a31 100%);touch-action:none}
#hud{position:fixed;top:14px;left:14px;z-index:10;min-width:300px;padding:12px 14px;border-radius:14px;background:rgba(15,16,22,.68);backdrop-filter:blur(10px);border:1px solid rgba(151,255,245,.28);box-shadow:0 0 24px rgba(119,224,255,.16);font-size:13px;line-height:1.55}
#hud .title{font-size:15px;font-weight:800;color:#9efff0;margin-bottom:4px;letter-spacing:.04em}
#cannonHudBars{display:grid;gap:6px;margin-top:8px}
.hudCannonRow{display:grid;grid-template-columns:44px 1fr 40px;align-items:center;gap:7px}
.hudCannonName{font-size:12px;font-weight:800;color:#e6fbff}
.hudEnergyTrack{height:8px;border-radius:999px;background:rgba(0,0,0,.52);border:1px solid rgba(255,255,255,.1);overflow:hidden}
.hudEnergyFill{height:100%;width:0%;border-radius:999px;background:#89fff2;box-shadow:0 0 10px currentColor}
.hudEnergyPct{font-size:11px;text-align:right;color:#d7faff}
#hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:10;padding:10px 14px;border-radius:999px;background:rgba(16,14,21,.74);border:1px solid rgba(255,255,255,.12);color:#e7faff;font-size:13px;white-space:nowrap}
#toast{position:fixed;left:50%;top:20%;transform:translate(-50%,-50%) scale(.92);z-index:60;padding:12px 18px;border-radius:999px;background:rgba(9,10,16,.9);border:1px solid rgba(137,255,242,.55);box-shadow:0 0 34px rgba(100,240,255,.24);color:#eaffff;font-weight:900;letter-spacing:.02em;opacity:0;pointer-events:none}
#toast.show{animation:toastPop .55s ease-out forwards}
#toast.good{border-color:rgba(137,255,242,.75);color:#9efff0}
#toast.bad{border-color:rgba(255,139,166,.75);color:#ffb5c5}
@keyframes toastPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.82)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-68%) scale(.96)}}
#statusWindow{position:fixed;top:50%;left:50%;width:min(430px,calc(100vw - 32px));transform:translate(-50%,-50%) scale(.96);padding:18px;border-radius:18px;border:1px solid rgba(129,255,239,.72);background:radial-gradient(circle at 20% 0%,rgba(102,255,236,.16),transparent 36%),radial-gradient(circle at 90% 15%,rgba(152,118,255,.18),transparent 30%),rgba(11,10,18,.90);backdrop-filter:blur(14px);box-shadow:0 0 40px rgba(90,255,237,.18),inset 0 0 26px rgba(130,210,255,.06);z-index:30;display:none}
#statusWindow.show{display:block;animation:popIn .12s ease-out forwards}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.windowHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;color:#86fff1;font-weight:800;letter-spacing:.04em}
#closeWindow{width:28px;height:28px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:#effcff;cursor:pointer}
#questionText{padding:14px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);font-size:16px;line-height:1.5;margin-bottom:12px}
#choices{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.choiceBtn{padding:11px 10px;border-radius:12px;border:1px solid rgba(126,255,239,.34);background:rgba(16,20,31,.82);color:#effcff;cursor:pointer;font-weight:700;transition:transform .12s,background .12s,border-color .12s}
.choiceBtn:hover{transform:translateY(-1px);background:rgba(37,50,76,.9);border-color:rgba(126,255,239,.78)}
#upgradeWindow{position:fixed;inset:0;z-index:50;display:none;place-items:center;background:rgba(0,0,0,.48);backdrop-filter:blur(5px)}
#upgradePanel{width:min(760px,calc(100vw - 28px));padding:22px;border-radius:22px;background:radial-gradient(circle at 20% 0%,rgba(102,255,236,.13),transparent 38%),rgba(12,10,18,.93);border:1px solid rgba(137,255,242,.42);box-shadow:0 0 50px rgba(112,225,255,.2)}
#upgradeTitle{font-size:20px;font-weight:900;color:#9efff0;margin-bottom:6px}
#upgradeSub{font-size:13px;color:#c9edf4;margin-bottom:16px}
#upgradeCards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.upgradeCard{min-height:128px;padding:16px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#eefcff;cursor:pointer;text-align:left;transition:transform .12s,border-color .12s,background .12s}
.upgradeCard:hover{transform:translateY(-3px);border-color:rgba(137,255,242,.75);background:rgba(137,255,242,.1)}
.upgradeCard b{display:block;font-size:16px;color:#ffffff;margin-bottom:8px}
.upgradeCard span{font-size:13px;color:#c7e8ee;line-height:1.45}
#gameOver{position:fixed;inset:0;z-index:40;display:none;place-items:center;background:rgba(0,0,0,.58)}
#gameOver .box{width:min(420px,calc(100vw - 32px));padding:24px;border-radius:20px;background:rgba(12,10,18,.95);border:1px solid rgba(116,240,255,.42);box-shadow:0 0 40px rgba(112,225,255,.18);text-align:center}
#restartBtn{margin-top:14px;padding:10px 18px;border:0;border-radius:999px;background:#89fff2;color:#15131a;font-weight:900;cursor:pointer}
@media(max-width:680px){
  #hud{min-width:245px;font-size:12px}
  #hint{font-size:12px;max-width:calc(100vw - 20px);white-space:normal;text-align:center}
  #upgradeCards{grid-template-columns:1fr}
  .upgradeCard{min-height:auto}
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="title">BYURI WASTELAND DEFENSE 2D</div>
  <div>코어 내구도: <b id="coreHpText">100</b></div>
  <div>처치한 슬라임: <b id="killText">0</b></div>
  <div>흐른 시간: <b id="timeText">0</b>s</div>
  <div>포탑 상태: <b id="levelText">10시 Lv.1 / 12시 Lv.1 / 2시 Lv.1</b></div>
  <div id="cannonHudBars"></div>
</div>

<div id="hint">포탑 클릭 → 문제 풀이 → 에너지 충전 · 각 포탑은 자기 방향만 자동조준</div>
<div id="toast"></div>

<div id="statusWindow">
  <div class="windowHeader">
    <div id="windowTitle">상태창</div>
    <button id="closeWindow">×</button>
  </div>
  <div id="questionText"></div>
  <div id="choices"></div>
</div>

<div id="upgradeWindow">
  <div id="upgradePanel">
    <div id="upgradeTitle">포탑 진화</div>
    <div id="upgradeSub">강화 요소를 하나 선택하세요.</div>
    <div id="upgradeCards"></div>
  </div>
</div>

<div id="gameOver">
  <div class="box">
    <h2>상상력 코어가 무너졌습니다</h2>
    <p>벼리들이 빛을 잃었습니다. 다시 황무지를 지켜주세요.</p>
    <button id="restartBtn">다시 시작</button>
  </div>
</div>

<script>
var canvas=document.getElementById("game");
var ctx=canvas.getContext("2d");

var coreHpText=document.getElementById("coreHpText");
var killText=document.getElementById("killText");
var timeText=document.getElementById("timeText");
var levelText=document.getElementById("levelText");
var cannonHudBars=document.getElementById("cannonHudBars");
var toastEl=document.getElementById("toast");
var statusWindow=document.getElementById("statusWindow");
var windowTitle=document.getElementById("windowTitle");
var questionText=document.getElementById("questionText");
var choicesEl=document.getElementById("choices");
var closeWindow=document.getElementById("closeWindow");
var upgradeWindow=document.getElementById("upgradeWindow");
var upgradeTitle=document.getElementById("upgradeTitle");
var upgradeSub=document.getElementById("upgradeSub");
var upgradeCards=document.getElementById("upgradeCards");
var gameOverEl=document.getElementById("gameOver");
var restartBtn=document.getElementById("restartBtn");

var DPR=Math.min(window.devicePixelRatio||1,2);

var w=window.innerWidth;
var h=window.innerHeight;
var cx=w*0.5;
var cy=h*0.56;

var game={
  coreHp:100,
  kills:0,
  elapsed:0,
  spawnTimer:1.2,
  spawnBaseInterval:2.35,
  enemyBaseHp:15,
  gameOver:false,
  paused:false
};

var directions=[
  {name:"10시",angle:degToRad(210),bulletColor:"#9b5cff",laneColor:"rgba(190,150,255,.18)"},
  {name:"12시",angle:degToRad(270),bulletColor:"#36ffe1",laneColor:"rgba(120,255,236,.18)"},
  {name:"2시",angle:degToRad(330),bulletColor:"#74cfff",laneColor:"rgba(135,210,255,.18)"}
];

var upgradePool=[
  {
    id:"fireRate",
    title:"더 빠른 발포",
    desc:"해당 포탑의 발사 간격이 크게 줄어듭니다.",
    apply:function(c){c.cooldown=Math.max(.16,c.cooldown*.72);}
  },
  {
    id:"doubleShot",
    title:"쌍성 포탄",
    desc:"확률적으로 포탄을 2개 동시에 발사합니다.",
    apply:function(c){c.doubleShotChance=Math.min(.8,c.doubleShotChance+.28);}
  },
  {
    id:"burstFive",
    title:"오성 연발",
    desc:"긴 주기로 한 번에 포탄 5개를 흩뿌립니다.",
    apply:function(c){
      c.burstEnabled=true;
      c.burstInterval=Math.max(4.7,c.burstInterval*.88);
      c.burstTimer=Math.min(c.burstTimer,2.2);
    }
  },
  {
    id:"healCore",
    title:"코어 에너지 회복",
    desc:"상상력 코어 내구도를 50 회복합니다.",
    apply:function(c){
      game.coreHp=Math.min(100,game.coreHp+50);
      effects.push({type:"ring",x:cx,y:cy,life:.85,maxLife:.85,color:"#89fff2",r:30});
    }
  }
];

var cannons=[];
var enemies=[];
var projectiles=[];
var byuris=[];
var effects=[];

var activeCannon=null;
var activeAnswer=null;
var toastTimer=null;
var lastTime=performance.now();

init();
requestAnimationFrame(loop);

function init(){
  resize();
  initCannons();
  initByuris();
  initEvents();
  updateHud();
}

function initCannons(){
  cannons.length=0;
  cannonHudBars.innerHTML="";

  for(var i=0;i<directions.length;i++){
    var dir=directions[i];
    var r=Math.min(w,h)*0.18;
    var x=cx+Math.cos(dir.angle)*r;
    var y=cy+Math.sin(dir.angle)*r;

    var row=document.createElement("div");
    row.className="hudCannonRow";
    row.innerHTML='<div class="hudCannonName">'+dir.name+'</div><div class="hudEnergyTrack"><div class="hudEnergyFill"></div></div><div class="hudEnergyPct">100%</div>';
    cannonHudBars.appendChild(row);

    var fill=row.querySelector(".hudEnergyFill");
    fill.style.background=dir.bulletColor;
    fill.style.color=dir.bulletColor;

    cannons.push({
      index:i,
      name:dir.name,
      x:x,
      y:y,
      r:24,
      angle:dir.angle,
      bulletColor:dir.bulletColor,
      laneColor:dir.laneColor,
      level:1,
      correctCount:0,
      energy:100,
      charged:true,
      damage:17,
      cooldown:.56,
      fireTimer:Math.random()*.25,
      range:330,
      doubleShotChance:0,
      burstEnabled:false,
      burstInterval:8,
      burstTimer:4+Math.random()*2,
      hudFill:fill,
      hudPct:row.querySelector(".hudEnergyPct")
    });
  }
}

function initByuris(){
  byuris.length=0;

  for(var i=0;i<4;i++){
    byuris.push({
      baseAngle:Math.random()*Math.PI*2,
      orbit:58+Math.random()*40,
      heightSeed:Math.random()*Math.PI*2,
      mode:"support",
      x:cx,
      y:cy,
      vx:0,
      vy:0,
      phase:Math.random()*Math.PI*2,
      baseScale:.7+Math.random()*.12,
      blessTimer:0,
      blessDuration:1.45,
      blessCannon:null
    });
  }
}

function initEvents(){
  window.addEventListener("resize",resize);
  canvas.addEventListener("pointerdown",onPointerDown);
  closeWindow.addEventListener("click",closeStatus);
  restartBtn.addEventListener("click",resetGame);
}

function resize(){
  w=window.innerWidth;
  h=window.innerHeight;
  cx=w*0.5;
  cy=h*0.56;

  canvas.width=Math.floor(w*DPR);
  canvas.height=Math.floor(h*DPR);
  canvas.style.width=w+"px";
  canvas.style.height=h+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);

  var r=Math.min(w,h)*0.18;
  for(var i=0;i<cannons.length;i++){
    var c=cannons[i];
    c.x=cx+Math.cos(c.angle)*r;
    c.y=cy+Math.sin(c.angle)*r;
  }
}
function onPointerDown(e){
  if(game.gameOver || game.paused || statusWindow.classList.contains("show")) return;

  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;

  for(var i=0;i<cannons.length;i++){
    var cannon = cannons[i];

    if(dist(mx,my,cannon.x,cannon.y) <= cannon.r + 14){
      openStatus(cannon);
      break;
    }
  }
}

function openStatus(cannon){
  activeCannon = cannon;

  var q = makeQuestion();
  activeAnswer = q.answer;

  windowTitle.textContent = "상태창 호출 : " + cannon.name + " 포탑";

  questionText.innerHTML =
    "<b>" + q.text + "</b><br>" +
    '<span style="font-size:13px;color:#a9cfd7;">정답: 에너지 완전 충전 · 3문제 정답마다 진화</span>';

  choicesEl.innerHTML = "";

  for(var i=0;i<q.choices.length;i++){
    var choice = q.choices[i];
    var btn = document.createElement("button");

    btn.className = "choiceBtn";
    btn.textContent = choice;
    btn.addEventListener("click", makeChoiceHandler(choice));

    choicesEl.appendChild(btn);
  }

  statusWindow.classList.add("show");
}

function makeChoiceHandler(choice){
  return function(){
    answerQuestion(choice);
  };
}

function closeStatus(){
  statusWindow.classList.remove("show");
  activeCannon = null;
  activeAnswer = null;
}

function makeQuestion(){
  var patterns = [
    function(){
      var a = randInt(4,13);
      var b = randInt(3,11);

      return {
        text:"별가루 " + a + "개와 청록 결정 " + b + "개를 합치면 모두 몇 개인가?",
        answer:a+b
      };
    },
    function(){
      var a = randInt(2,7);
      var b = randInt(3,8);

      return {
        text:"벼리 " + a + "명이 각각 포탄 " + b + "개씩 충전했다. 총 포탄은 몇 개인가?",
        answer:a*b
      };
    },
    function(){
      var a = randInt(18,39);
      var b = randInt(4,13);

      return {
        text:"오염 수치 " + a + "에서 정화 수치 " + b + "를 빼면 남는 수치는?",
        answer:a-b
      };
    }
  ];

  var base = patterns[randInt(0,patterns.length-1)]();
  var set = new Set([base.answer]);

  while(set.size < 4){
    var offset = randInt(-9,9);
    var v = base.answer + offset;

    if(offset !== 0 && v >= 0){
      set.add(v);
    }
  }

  return {
    text:base.text,
    answer:base.answer,
    choices:shuffle(Array.from(set))
  };
}

function answerQuestion(choice){
  var buttons = document.querySelectorAll(".choiceBtn");

  for(var i=0;i<buttons.length;i++){
    buttons[i].disabled = true;
  }

  var correct = Number(choice) === activeAnswer;
  var cannon = activeCannon;

  if(correct){
    var evolved = chargeCannon(cannon);

    showToast(evolved ? "진화 가능!" : "정답 · 에너지 충전","good");
    closeStatus();

    if(evolved){
      setTimeout(function(){
        openUpgrade(cannon);
      },180);
    }
  }else{
    showToast("오답","bad");
    closeStatus();
  }
}

function chargeCannon(cannon){
  cannon.correctCount++;
  cannon.energy = 100;
  cannon.charged = true;

  effects.push({
    type:"ring",
    x:cannon.x,
    y:cannon.y,
    life:.55,
    maxLife:.55,
    color:cannon.bulletColor,
    r:18
  });

  triggerByuriBlessing(cannon);

  var evolved = false;

  if(cannon.correctCount >= 3){
    cannon.correctCount = 0;
    evolved = true;
  }

  return evolved;
}

function openUpgrade(cannon){
  if(!cannon || game.gameOver) return;

  game.paused = true;

  upgradeWindow.style.display = "grid";
  upgradeTitle.textContent = cannon.name + " 포탑 진화";
  upgradeSub.textContent = "강화 요소를 하나 선택하세요.";
  upgradeCards.innerHTML = "";

  var picks = shuffle(upgradePool.slice()).slice(0,3);

  for(var i=0;i<picks.length;i++){
    var upgrade = picks[i];
    var card = document.createElement("button");

    card.className = "upgradeCard";
    card.innerHTML = "<b>" + upgrade.title + "</b><span>" + upgrade.desc + "</span>";
    card.addEventListener("click", makeUpgradeHandler(cannon,upgrade));

    upgradeCards.appendChild(card);
  }
}

function makeUpgradeHandler(cannon,upgrade){
  return function(){
    applyUpgrade(cannon,upgrade);
  };
}

function applyUpgrade(cannon,upgrade){
  upgrade.apply(cannon);

  cannon.level++;
  cannon.damage = Math.round(cannon.damage * 1.12 + 2);
  cannon.range += 22;

  showToast(upgrade.title + " 적용","good");

  effects.push({
    type:"ring",
    x:cannon.x,
    y:cannon.y,
    life:.7,
    maxLife:.7,
    color:cannon.bulletColor,
    r:20
  });

  triggerByuriBlessing(cannon);

  upgradeWindow.style.display = "none";
  game.paused = false;
}

function triggerByuriBlessing(cannon){
  var chosen = null;

  for(var i=0;i<byuris.length;i++){
    if(byuris[i].mode !== "bless"){
      chosen = byuris[i];
      break;
    }
  }

  if(!chosen){
    chosen = byuris[0];
  }

  chosen.mode = "bless";
  chosen.blessCannon = cannon;
  chosen.blessTimer = 0;
  chosen.blessDuration = 1.45;
}

function spawnEnemy(){
  var laneIndex = randInt(0,directions.length-1);
  var dir = directions[laneIndex];

  var startR = Math.min(w,h) * 0.43;
  var spread = 38;

  var x = cx + Math.cos(dir.angle) * startR + randFloat(-spread,spread);
  var y = cy + Math.sin(dir.angle) * startR + randFloat(-spread,spread);

  var hpScale = 1 + game.elapsed * .0095;
  var hp = Math.round(game.enemyBaseHp * hpScale);

  enemies.push({
    laneIndex:laneIndex,
    x:x,
    y:y,
    hp:hp,
    maxHp:hp,
    speed:randFloat(34,48),
    size:20 + Math.random() * 4,
    wobble:Math.random() * Math.PI * 2,
    hitFlash:0
  });
}

function fireProjectile(cannon,target,spread){
  if(spread === undefined){
    spread = 0;
  }

  var dx = target.x - cannon.x;
  var dy = target.y - cannon.y;
  var ang = Math.atan2(dy,dx) + spread;
  var speed = 340 + cannon.level * 18;

  projectiles.push({
    laneIndex:cannon.index,
    x:cannon.x + Math.cos(ang) * 20,
    y:cannon.y + Math.sin(ang) * 20,
    vx:Math.cos(ang) * speed,
    vy:Math.sin(ang) * speed,
    damage:cannon.damage,
    color:cannon.bulletColor,
    life:2.1,
    r:5
  });
}

function fireCannon(cannon,target){
  fireProjectile(cannon,target,0);

  if(cannon.doubleShotChance > 0 && Math.random() < cannon.doubleShotChance){
    fireProjectile(cannon,target,randFloat(-.12,.12));
  }
}

function fireBurst(cannon,target){
  var spreads = [-.18,-.09,0,.09,.18];

  for(var i=0;i<spreads.length;i++){
    fireProjectile(cannon,target,spreads[i]);
  }
}

function findTargetForCannon(cannon){
  var best = null;
  var bestScore = Infinity;

  for(var i=0;i<enemies.length;i++){
    var e = enemies[i];

    if(e.laneIndex !== cannon.index) continue;

    var d = dist(cannon.x,cannon.y,e.x,e.y);
    if(d > cannon.range) continue;

    var score = d + e.hp * .02;

    if(score < bestScore){
      bestScore = score;
      best = e;
    }
  }

  return best;
}
function update(dt){
  if(game.gameOver || game.paused) return;

  game.elapsed += dt;

  updateSpawning(dt);
  updateCannons(dt);
  updateEnemies(dt);
  updateProjectiles(dt);
  updateByuris(dt);
  updateEffects(dt);
  updateEnergy(dt);
  updateHud();
}

function updateSpawning(dt){
  game.spawnTimer -= dt;

  var difficulty = Math.min(.82, game.elapsed * .0034);
  var interval = Math.max(.82, game.spawnBaseInterval - difficulty);

  if(game.spawnTimer <= 0){
    spawnEnemy();

    if(game.elapsed > 42 && Math.random() < .13){
      spawnEnemy();
    }

    if(game.elapsed > 90 && Math.random() < .12){
      spawnEnemy();
    }

    game.spawnTimer = interval;
  }
}

function updateCannons(dt){
  for(var i=0;i<cannons.length;i++){
    var cannon = cannons[i];

    cannon.fireTimer -= dt;
    cannon.burstTimer -= dt;

    var target = findTargetForCannon(cannon);

    if(!target) continue;
    if(!(cannon.charged && cannon.energy > 0)) continue;

    if(cannon.burstEnabled && cannon.burstTimer <= 0){
      fireBurst(cannon,target);
      cannon.burstTimer = cannon.burstInterval;
      cannon.fireTimer = Math.max(cannon.fireTimer,.18);
    }

    if(cannon.fireTimer <= 0){
      fireCannon(cannon,target);
      cannon.fireTimer = cannon.cooldown;
    }
  }
}

function updateEnemies(dt){
  for(var i=enemies.length-1;i>=0;i--){
    var e = enemies[i];

    var dx = cx - e.x;
    var dy = cy - e.y;
    var d = Math.sqrt(dx*dx + dy*dy) || 1;

    e.x += dx / d * e.speed * dt;
    e.y += dy / d * e.speed * dt;

    e.wobble += dt * 6.8;

    if(e.hitFlash > 0){
      e.hitFlash -= dt;
    }

    if(d < 26){
      game.coreHp -= 7;

      effects.push({
        type:"ring",
        x:cx,
        y:cy,
        life:.45,
        maxLife:.45,
        color:"#ffb7c7",
        r:26
      });

      enemies.splice(i,1);

      if(game.coreHp <= 0){
        game.coreHp = 0;
        endGame();
      }
    }
  }
}

function updateProjectiles(dt){
  for(var i=projectiles.length-1;i>=0;i--){
    var p = projectiles[i];

    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    var hit = false;

    for(var j=enemies.length-1;j>=0;j--){
      var e = enemies[j];

      if(e.laneIndex !== p.laneIndex) continue;

      if(dist(p.x,p.y,e.x,e.y) < e.size * .8){
        e.hp -= p.damage;
        e.hitFlash = .08;

        effects.push({
          type:"puff",
          x:p.x,
          y:p.y,
          life:.18,
          maxLife:.18,
          color:p.color,
          r:8
        });

        hit = true;

        if(e.hp <= 0){
          enemies.splice(j,1);
          game.kills++;
        }

        break;
      }
    }

    if(hit || p.life <= 0 || p.x < -30 || p.x > w + 30 || p.y < -30 || p.y > h + 30){
      projectiles.splice(i,1);
    }
  }
}

function updateEffects(dt){
  for(var i=effects.length-1;i>=0;i--){
    effects[i].life -= dt;

    if(effects[i].life <= 0){
      effects.splice(i,1);
    }
  }
}

function updateByuris(dt){
  var t = game.elapsed;

  for(var i=0;i<byuris.length;i++){
    var b = byuris[i];

    if(b.mode === "bless" && b.blessCannon){
      b.blessTimer += dt;

      var tt = b.blessTimer / b.blessDuration;
      var c = b.blessCannon;
      var ang = t * 12 + b.phase;
      var rr = 16 * (1 - Math.min(.55,tt));

      var tx = c.x + Math.cos(ang) * rr;
      var ty = c.y + Math.sin(ang) * rr * .7;

      b.vx = (tx - b.x) * 7.2;
      b.vy = (ty - b.y) * 7.2;

      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if(Math.random() < .18){
        effects.push({
          type:"spark",
          x:b.x,
          y:b.y,
          life:.35,
          maxLife:.35,
          color:c.bulletColor,
          r:2
        });
      }

      if(tt >= 1){
        b.mode = "support";
        b.blessCannon = null;
        b.blessTimer = 0;
      }
    }else{
      var a = b.baseAngle + t * (.42 + i * .06) + Math.sin(t * .8 + b.phase) * .28;
      var orbit = b.orbit + Math.sin(t * 1.4 + b.phase) * 10;
      var hover = Math.sin(t * 2.1 + b.heightSeed) * 10 + Math.sin(t * 3.3 + b.phase) * 4;

      var tx2 = cx + Math.cos(a) * orbit;
      var ty2 = cy + Math.sin(a) * orbit * .65 - 45 + hover;

      b.vx = (tx2 - b.x) * 4.4;
      b.vy = (ty2 - b.y) * 4.4;

      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }
  }
}

function updateEnergy(dt){
  for(var i=0;i<cannons.length;i++){
    var c = cannons[i];

    var drain = 1.1;

    if(c.charged){
      drain = 4.2;
    }

    c.energy = Math.max(0,c.energy - drain * dt);

    if(c.energy <= 0){
      c.charged = false;
    }

    c.hudFill.style.width = c.energy + "%";

    if(c.charged){
      c.hudFill.style.opacity = "0.98";
    }else{
      c.hudFill.style.opacity = "0.55";
    }

    c.hudPct.textContent = Math.floor(c.energy) + "%";
  }
}

function draw(){
  ctx.clearRect(0,0,w,h);

  drawBackground();
  drawLanes();
  drawCore();
  drawProjectiles();
  drawEnemies();
  drawCannons();
  drawByuris();
  drawEffects();
}

function drawBackground(){
  var rockCount = 20;

  for(var i=0;i<rockCount;i++){
    var x = (i * 217) % w;
    var y = (i * 149) % h;
    var s = 6 + (i % 5) * 3;

    if(i % 2){
      ctx.fillStyle = "rgba(40,28,32,.28)";
    }else{
      ctx.fillStyle = "rgba(95,72,78,.18)";
    }

    ctx.beginPath();
    ctx.moveTo(x,y-s);
    ctx.lineTo(x+s*.8,y);
    ctx.lineTo(x,y+s);
    ctx.lineTo(x-s*.7,y+.1);
    ctx.closePath();
    ctx.fill();
  }
}

function drawLanes(){
  var laneLen = Math.min(w,h) * .42;

  for(var i=0;i<directions.length;i++){
    var dir = directions[i];

    var x2 = cx + Math.cos(dir.angle) * laneLen;
    var y2 = cy + Math.sin(dir.angle) * laneLen;

    ctx.strokeStyle = dir.laneColor;
    ctx.lineWidth = 24;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,.06)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  }
}

function drawCore(){
  ctx.save();

  var pulse = 1 + Math.sin(game.elapsed * 2.2) * .04;

  ctx.fillStyle = "#17131a";
  ctx.beginPath();
  ctx.arc(cx,cy,34,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#89fff2";
  ctx.globalAlpha = .22;
  ctx.beginPath();
  ctx.arc(cx,cy,42*pulse,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha = 1;

  drawDiamond(cx,cy,18,"#8effef","#4ae8ff");

  ctx.restore();
}

function drawCannons(){
  for(var i=0;i<cannons.length;i++){
    var c = cannons[i];
    var target = findTargetForCannon(c);
    var ang = c.angle;

    if(target){
      ang = Math.atan2(target.y - c.y,target.x - c.x);
    }

    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.rotate(ang);

    ctx.fillStyle = "#1a171c";
    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#060608";
    roundRect(ctx,-8,-13,32,26,10,true,false);

    ctx.fillStyle = "#050507";
    roundRect(ctx,12,-5,28,10,5,true,false);

    ctx.fillStyle = c.bulletColor;
    ctx.beginPath();
    ctx.arc(41,0,6,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    ctx.save();
    ctx.fillStyle = "#f4ffff";
    ctx.font = "bold 11px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(c.name,c.x,c.y-34);

    ctx.fillStyle = "rgba(7,8,12,.78)";
    roundRect(ctx,c.x-28,c.y-48,56,8,99,true,false);

    ctx.fillStyle = c.bulletColor;
    roundRect(ctx,c.x-28,c.y-48,56*(c.energy/100),8,99,true,false);

    ctx.restore();
  }
}

function drawEnemies(){
  for(var i=0;i<enemies.length;i++){
    var e = enemies[i];

    var dx = cx - e.x;
    var dy = cy - e.y;
    var ang = Math.atan2(dy,dx);

    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.rotate(ang + Math.PI/2);

    var sy = 1 + Math.sin(e.wobble) * .05;
    var sx = 1 - Math.sin(e.wobble) * .025;

    ctx.scale(sx,sy);

    if(e.hitFlash > 0){
      ctx.fillStyle = "#8ef7df";
    }else{
      ctx.fillStyle = "#55bca1";
    }

    ctx.shadowColor = "rgba(120,255,220,.3)";
    ctx.shadowBlur = 12;

    ctx.beginPath();
    ctx.moveTo(0,-e.size*1.0);
    ctx.bezierCurveTo(e.size*.95,-e.size*.65,e.size*.95,e.size*.55,0,e.size*.85);
    ctx.bezierCurveTo(-e.size*.95,e.size*.55,-e.size*.95,-e.size*.65,0,-e.size*1.0);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;

    ctx.fillStyle = "rgba(217,255,245,.35)";
    ctx.beginPath();
    ctx.ellipse(-e.size*.22,-e.size*.25,e.size*.18,e.size*.1,-.6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#060608";
    ctx.beginPath();
    ctx.ellipse(-e.size*.22,-e.size*.05,e.size*.10,e.size*.14,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(e.size*.22,-e.size*.05,e.size*.10,e.size*.14,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    drawEnemyLaneBadge(e);
  }
}

function drawEnemyLaneBadge(e){
  var dir = directions[e.laneIndex];

  ctx.save();
  ctx.globalAlpha = .72;
  ctx.fillStyle = dir.bulletColor;
  ctx.beginPath();
  ctx.arc(e.x,e.y+e.size+8,3.5,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawProjectiles(){
  for(var i=0;i<projectiles.length;i++){
    var p = projectiles[i];

    ctx.save();
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawByuris(){
  for(var i=0;i<byuris.length;i++){
    var b = byuris[i];

    var a = Math.atan2(b.vy,b.vx || 0.0001);
    var scale = b.baseScale * (1 + Math.sin(game.elapsed*4 + b.phase) * .08);

    drawByuri(b.x,b.y,a,scale);
  }
}

function drawByuri(x,y,ang,scale){
  ctx.save();

  ctx.translate(x,y);
  ctx.rotate(ang);
  ctx.scale(scale,scale);

  ctx.fillStyle = "rgba(255,245,192,.16)";
  ctx.beginPath();
  ctx.arc(0,0,19,0,Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.rotate(.42);

  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(0,-10,8.8,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#fff7d8";
  ctx.beginPath();
  ctx.arc(0,-8,7.2,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#18181d";
  ctx.beginPath();
  ctx.ellipse(-2.2,-7.7,1.2,2.2,0,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(2.2,-7.7,1.2,2.2,0,0,Math.PI*2);
  ctx.fill();

  var grad = ctx.createLinearGradient(0,-3,0,18);
  grad.addColorStop(0,"#ffffff");
  grad.addColorStop(.25,"#fffce7");
  grad.addColorStop(.55,"#e8d84f");
  grad.addColorStop(.82,"#d88a48");
  grad.addColorStop(1,"#6f2a83");

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-2,-2);
  ctx.lineTo(2,-2);
  ctx.lineTo(8,10);
  ctx.quadraticCurveTo(0,18,-8,10);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
  ctx.restore();
}

function drawEffects(){
  for(var i=0;i<effects.length;i++){
    var fx = effects[i];
    var ratio = 1 - fx.life / fx.maxLife;

    if(fx.type === "ring"){
      ctx.save();
      ctx.strokeStyle = fx.color;
      ctx.globalAlpha = (1-ratio) * .85;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(fx.x,fx.y,fx.r + ratio*34,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    if(fx.type === "puff"){
      ctx.save();
      ctx.fillStyle = fx.color;
      ctx.globalAlpha = (1-ratio) * .7;
      ctx.beginPath();
      ctx.arc(fx.x,fx.y,fx.r + ratio*10,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    if(fx.type === "spark"){
      ctx.save();
      ctx.fillStyle = fx.color;
      ctx.globalAlpha = (1-ratio) * .95;
      ctx.beginPath();
      ctx.arc(fx.x,fx.y-ratio*10,fx.r + ratio*3,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }
}

function updateHud(){
  coreHpText.textContent = Math.ceil(game.coreHp);
  killText.textContent = game.kills;
  timeText.textContent = Math.floor(game.elapsed);

  var parts = [];

  for(var i=0;i<cannons.length;i++){
    parts.push(cannons[i].name + " Lv." + cannons[i].level);
  }

  levelText.textContent = parts.join(" / ");
}

function showToast(text,type){
  clearTimeout(toastTimer);

  toastEl.textContent = text;
  toastEl.className = "";

  void toastEl.offsetWidth;

  toastEl.classList.add("show",type);

  toastTimer = setTimeout(function(){
    toastEl.className = "";
  },620);
}

function resetGame(){
  game.coreHp = 100;
  game.kills = 0;
  game.elapsed = 0;
  game.spawnTimer = 1.2;
  game.gameOver = false;
  game.paused = false;

  enemies.length = 0;
  projectiles.length = 0;
  effects.length = 0;

  closeStatus();

  upgradeWindow.style.display = "none";
  gameOverEl.style.display = "none";

  for(var i=0;i<cannons.length;i++){
    var c = cannons[i];

    c.level = 1;
    c.correctCount = 0;
    c.energy = 100;
    c.charged = true;
    c.damage = 17;
    c.cooldown = .56;
    c.fireTimer = Math.random() * .25;
    c.range = 330;
    c.doubleShotChance = 0;
    c.burstEnabled = false;
    c.burstInterval = 8;
    c.burstTimer = 4 + Math.random() * 2;
  }

  initByuris();
  updateHud();
}

function endGame(){
  game.gameOver = true;
  game.paused = false;
  gameOverEl.style.display = "grid";
}

function loop(now){
  var dt = Math.min((now-lastTime)/1000,.04);
  lastTime = now;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

function drawDiamond(x,y,r,fill,glow){
  ctx.save();
  ctx.fillStyle = fill;
  ctx.shadowColor = glow;
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(x,y-r);
  ctx.lineTo(x+r*.75,y);
  ctx.lineTo(x,y+r);
  ctx.lineTo(x-r*.75,y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  var rr = Math.min(r,w/2,h/2);

  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();

  if(fill){
    ctx.fill();
  }

  if(stroke){
    ctx.stroke();
  }
}

function dist(x1,y1,x2,y2){
  var dx = x2 - x1;
  var dy = y2 - y1;

  return Math.sqrt(dx*dx + dy*dy);
}

function randInt(min,max){
  return Math.floor(Math.random() * (max-min+1)) + min;
}

function randFloat(min,max){
  return Math.random() * (max-min) + min;
}

function degToRad(deg){
  return deg * Math.PI / 180;
}

function clamp(v,min,max){
  return Math.max(min,Math.min(max,v));
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j = randInt(0,i);
    var temp = arr[i];

    arr[i] = arr[j];
    arr[j] = temp;
  }

  return arr;
}
