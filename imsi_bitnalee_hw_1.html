<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간접의문문 짜보기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", sans-serif;
      background: #f4efe7;
      color: #20242c;
    }

    .wrap {
      max-width: 1540px;
      margin: 0 auto;
      padding: 24px 18px 30px;
    }

    .head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: -0.06em;
      font-weight: 950;
    }

    .count {
      font-size: 14px;
      font-weight: 900;
      color: #6c7280;
      white-space: nowrap;
      padding-bottom: 3px;
    }

    .stage-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px minmax(0, 1fr) 34px minmax(0, 1fr) 34px minmax(0, 1fr) 34px minmax(0, 1fr);
      gap: 8px;
      align-items: stretch;
      width: 100%;
    }

    .panel {
      background: #fffdf8;
      border: 1px solid #ded8ce;
      border-radius: 22px;
      padding: 16px 15px;
      min-height: 330px;
      box-shadow: 0 9px 22px rgba(24, 31, 42, 0.065);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .panel.base {
      background: linear-gradient(180deg, #ffffff 0%, #f6faff 100%);
      border-color: #cbd8e8;
    }

    .panel.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    .stage {
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 950;
      color: #687181;
      letter-spacing: -0.045em;
    }

    .ko {
      margin-bottom: 12px;
      font-size: 18px;
      line-height: 1.35;
      font-weight: 850;
      letter-spacing: -0.05em;
      word-break: keep-all;
      color: #303744;
    }

    .en, .blank-line {
      border: 1px solid #ebe3d8;
      border-radius: 16px;
      background: #f8f6f1;
      padding: 12px 12px;
      min-height: 112px;
    }

    .en {
      font-size: 21px;
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: -0.045em;
      word-break: keep-all;
      color: #111827;
    }

    .blank-line {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      align-items: center;
      gap: 8px 6px;
    }

    .arrow-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
    }

    .arrow-cell.hidden { visibility: hidden; }

    button {
      border: 1px solid #1f2937;
      background: #1f2937;
      color: white;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -0.045em;
      cursor: pointer;
      white-space: nowrap;
    }

    button:disabled {
      opacity: 0.58;
      cursor: default;
    }

    .arrow-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      line-height: 1;
      background: #263241;
      border-color: #263241;
      box-shadow: 0 7px 15px rgba(31, 41, 55, 0.14);
    }

    .arrow-static {
      font-size: 22px;
      line-height: 1;
      font-weight: 950;
      color: #969eaa;
    }

    .solo-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .solo-btn {
      padding: 12px 22px;
      font-size: 17px;
      background: #111827;
      border-color: #111827;
    }

    .skip-btn {
      min-width: 130px;
      background: #ffffff;
      color: #1f2937;
      border-color: #cfd5df;
    }

    .review-btn {
      min-width: 130px;
      background: #ffffff;
      color: #1f2937;
      border-color: #cfd5df;
    }

    .bottom-bar {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 900;
      color: #6c7280;
      text-align: center;
    }

    .done-panel {
      display: none;
      margin-top: 16px;
    }

    .done-panel.active {
      display: block;
    }

    .done-card {
      border: 1px solid #ded8ce;
      border-radius: 22px;
      background: #fffdf8;
      padding: 20px 18px;
      text-align: center;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.045em;
      color: #111827;
      box-shadow: 0 9px 22px rgba(24, 31, 42, 0.065);
    }

    .word-blank {
      height: 36px;
      min-width: 44px;
      max-width: 126px;
      border: none;
      border-bottom: 3px solid #aeb8c5;
      border-radius: 9px 9px 5px 5px;
      background: #ffffff;
      padding: 3px 6px 1px;
      outline: none;
      font-family: inherit;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
      text-align: center;
      color: #111827;
      transition: background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .word-blank:focus {
      border-bottom-color: #64748b;
      box-shadow: 0 0 0 3px rgba(100, 116, 139, 0.13);
    }

    .word-blank.wh { background: #fff1a8; border-bottom-color: #d8a700; }
    .word-blank.subj { background: #dff0ff; border-bottom-color: #4c94d9; }
    .word-blank.verb { background: #ffe1e6; border-bottom-color: #e07180; }
    .word-blank.wh-soft { background: #fffdf2; border-bottom-color: #eadb93; }
    .word-blank.aux-soft { background: #fff8f8; border-bottom-color: #ecc1c7; }

    .word-blank.correct {
      background: #e7f8ed !important;
      border-bottom-color: #1f9d55 !important;
      box-shadow: 0 0 0 3px rgba(31, 157, 85, 0.12);
    }

    .word-blank.wrong {
      background: #fff0ef !important;
      border-bottom-color: #e05243 !important;
      box-shadow: 0 0 0 3px rgba(224, 82, 67, 0.13);
    }

    .punc {
      margin-left: -5px;
      font-size: 23px;
      font-weight: 950;
      color: #1f2937;
      align-self: flex-end;
      padding-bottom: 4px;
    }

    .mark {
      display: inline;
      padding: 0 0.015em;
      border-radius: 0.15em;
      background-repeat: no-repeat;
      background-size: 100% 0.52em;
      background-position: 0 88%;
    }

    .mark.wh { background-image: linear-gradient(transparent 24%, #f0c72a 24%); }
    .mark.subj { background-image: linear-gradient(transparent 28%, #9ed0ff 28%); }
    .mark.verb { background-image: linear-gradient(transparent 30%, #ff9aaa 30%); }
    .mark.wh-soft { background-image: linear-gradient(transparent 78%, rgba(240, 199, 42, 0.18) 78%); }
    .mark.aux-soft { background-image: linear-gradient(transparent 80%, rgba(255, 154, 170, 0.16) 80%); }

    @media (max-width: 1180px) {
      .wrap { max-width: 980px; }
      .panel { min-height: 300px; }
      .en { font-size: 19px; }
      .ko { font-size: 17px; }
      .word-blank { font-size: 16px; }
    }

    @media (max-width: 960px) {
      .stage-grid { grid-template-columns: 1fr; }
      .panel.hidden { display: none; }
      .arrow-cell {
        min-height: 34px;
      }
      .arrow-btn,
      .arrow-static {
        transform: rotate(90deg);
      }
      .arrow-cell.hidden {
        display: none;
      }
      .head { flex-direction: column; align-items: flex-start; }
      .panel { min-height: auto; }
      .solo-row {
        justify-content: stretch;
      }
      .solo-row button {
        flex: 1 1 220px;
      }
    }
  </style>
</head>
<body>

  </div>

    const strongWhWords = ["what", "where", "why", "who", "how", "when"];
    const weakWhPhrases = ["for a reason", "in some way", "at some time", "something", "somewhere", "someone"];
    const subjectPhrases = ["the accident", "the meeting", "the machine", "the book", "they", "she", "you", "he"];
    const softAuxWords = ["does", "did", "do"];
    const verbPhrases = [
      "can solve", "is angry", "was late", "is missing",
      "bought", "changed", "caused", "opened", "happened", "trusts", "starts", "works", "lives", "makes", "chose", "broke", "left",
      "want", "need", "trust", "happen", "break", "make", "cause", "solve", "buy", "start", "open", "change", "choose", "work", "live", "leave", "is", "was"
    ];

    const STORAGE_KEY = "imsi_user_custom_hw_indirect_state_v1";
    const CURRENT_KEY = "imsi_user_custom_hw_indirect_current_v1";
    const REVEAL_KEY = "imsi_user_custom_hw_indirect_reveal_v1";
    const PRACTICE_KEY = "imsi_user_custom_hw_indirect_practice_v1";
    const SUBMIT_MARKER_KEY = "imsi_user_custom_hw_indirect_submit_marker_v1";
    const HWPLUS_API_URL = "https://port-0-ltryi-database-1ru12mlw3glz2u.sel5.cloudtype.app/api/saveHWPlus";
    const DIRECT_SUBCATEGORY = "공사중";
    const DIRECT_HWTYPE = "doneinweb";
    const DIRECT_COMMENT = "imsi_user_custom_hw indirect question answers";
    const BLANK_STAGE_INDEXES = [1, 2, 3, 4];

    const mainEl = document.getElementById("main");
    const countEl = document.getElementById("count");
    const bottomBarEl = document.getElementById("bottomBar");
    const bottomRow = document.getElementById("bottomRow");
    const saveStatusEl = document.getElementById("saveStatus");
    const donePanelEl = document.getElementById("donePanel");

    function createDefaultItemState() {
      return {
        answers: {
          1: [],
          2: [],
          3: [],
          4: []
        }
      };
    }

    function normalizeItemState(raw) {
      const itemState = createDefaultItemState();
      if (!raw || typeof raw !== "object") return itemState;
      BLANK_STAGE_INDEXES.forEach((stageIndex) => {
        const stageAnswers = raw.answers && Array.isArray(raw.answers[stageIndex]) ? raw.answers[stageIndex] : [];
        itemState.answers[stageIndex] = stageAnswers.map((value) => typeof value === "string" ? value : "");
      });
      return itemState;
    }

    function loadSavedState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        const source = Array.isArray(parsed) ? parsed : [];
        return data.map((_, index) => normalizeItemState(source[index]));
      } catch (_) {
        return data.map(() => createDefaultItemState());
      }
    }

    function readStoredNumber(key, fallback) {
      const value = Number(localStorage.getItem(key));
      return Number.isInteger(value) ? value : fallback;
    }

    let savedState = loadSavedState();
    let cardIndex = readStoredNumber(CURRENT_KEY, 0);
    if (cardIndex < 0 || cardIndex >= data.length) cardIndex = 0;

    let revealLevel = readStoredNumber(REVEAL_KEY, 1);
    if (revealLevel < 1 || revealLevel > 5) revealLevel = 1;

    let practiceMode = localStorage.getItem(PRACTICE_KEY) === "1";
    let submittedToday = false;
    let isSubmitting = false;
    let advanceTimer = null;

    function getItemState(index) {
      if (!savedState[index]) savedState[index] = createDefaultItemState();
      return savedState[index];
    }

    function saveAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedState));
      localStorage.setItem(CURRENT_KEY, String(cardIndex));
      localStorage.setItem(REVEAL_KEY, String(revealLevel));
      localStorage.setItem(PRACTICE_KEY, practiceMode ? "1" : "0");
    }

    function resetWorkbookState() {
      savedState = data.map(() => createDefaultItemState());
      cardIndex = 0;
      revealLevel = 1;
      practiceMode = false;
    }

    function initToast() {
      if (!window.ImsiToastFX || typeof window.ImsiToastFX.init !== "function") return;
      if (initToast.ready) return;
      window.ImsiToastFX.init({ hostId: "cafe_int", top: 10 });
      initToast.ready = true;
    }

    function showToast(kind, message, options) {
      if (window.ImsiToastFX && typeof window.ImsiToastFX.show === "function") {
        window.ImsiToastFX.show(kind, message, options);
      }
    }

    function scheduleAdvance(callback, delay) {
      clearTimeout(advanceTimer);
      advanceTimer = setTimeout(() => {
        advanceTimer = null;
        callback();
      }, delay);
    }

    function getCurrentUserId() {
      try {
        return String(new URLSearchParams(window.location.search || "").get("id") || "").trim();
      } catch (_) {
        return "";
      }
    }

    function getKstTodayString() {
      const now = new Date(Date.now() + (9 * 60 * 60 * 1000));
      return now.toISOString().slice(0, 10);
    }

    function readSubmitMarker() {
      try {
        const raw = localStorage.getItem(SUBMIT_MARKER_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function writeSubmitMarker(userId, dateStr) {
      localStorage.setItem(SUBMIT_MARKER_KEY, JSON.stringify({
        userId: String(userId || ""),
        date: String(dateStr || "")
      }));
    }

    function clearSubmitMarker() {
      localStorage.removeItem(SUBMIT_MARKER_KEY);
    }

    function hasLocalSubmittedToday(userId) {
      const marker = readSubmitMarker();
      if (!marker) return false;
      return String(marker.userId || "") === String(userId || "") && String(marker.date || "") === getKstTodayString();
    }

    async function fetchSubmittedTodayFromServer(userId) {
      const res = await fetch(`${HWPLUS_API_URL.replace("/saveHWPlus", "/getHWPlus")}?userId=${encodeURIComponent(userId)}`);
      if (!res.ok) throw new Error(String(res.status));

      const response = await res.json();
      if (!Array.isArray(response)) return false;

      const todayStr = getKstTodayString();
      return response.some((item) => {
        const timestamp = String(item.Timestamp || item.timestamp || "");
        const subcategory = String(item.Subcategory || item.subcategory || "").trim();
        const hwType = String(item.HWType || item.hwtype || "").trim();
        const comment = String(item.Comment || item.comment || "").trim();
        return (
          timestamp.startsWith(todayStr) &&
          subcategory === DIRECT_SUBCATEGORY &&
          hwType === DIRECT_HWTYPE &&
          comment === DIRECT_COMMENT
        );
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitForServerSubmission(userId, attempts = 4, delayMs = 450) {
      for (let i = 0; i < attempts; i += 1) {
        try {
          if (await fetchSubmittedTodayFromServer(userId)) return true;
        } catch (_) {
        }

        if (i < attempts - 1) await wait(delayMs);
      }
      return false;
    }

    async function checkSubmittedToday() {
      const userId = getCurrentUserId();
      if (!userId) return false;

      const hasLocalMarker = hasLocalSubmittedToday(userId);
      try {
        const hasServerRecord = await fetchSubmittedTodayFromServer(userId);
        if (hasServerRecord) {
          if (!hasLocalMarker) writeSubmitMarker(userId, getKstTodayString());
          return true;
        }
        if (hasLocalMarker) clearSubmitMarker();
        return false;
      } catch (_) {
        return hasLocalMarker;
      }
    }

    function buildTrayUrl() {
      const userId = getCurrentUserId();
      const target = new URL("homework-tray_v1.html", window.location.href);
      if (userId) target.searchParams.set("id", userId);
      return target.toString();
    }

    function escapeHTML(text) {
      return String(text).replace(/[&<>'"]/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      }[char]));
    }

    function isWordChar(char) {
      return /[A-Za-z']/.test(char || "");
    }

    function collectRanges(text, phrases, className, ranges) {
      const lower = text.toLowerCase();
      const sorted = [...phrases].sort((a, b) => b.length - a.length);
      sorted.forEach(phrase => {
        const target = phrase.toLowerCase();
        let pos = 0;
        while ((pos = lower.indexOf(target, pos)) !== -1) {
          const end = pos + target.length;
          const leftOK = !isWordChar(text[pos - 1]);
          const rightOK = !isWordChar(text[end]);
          const overlaps = ranges.some(r => pos < r.end && end > r.start);
          if (leftOK && rightOK && !overlaps) ranges.push({ start: pos, end, className });
          pos = end;
        }
      });
    }

    function getRanges(text) {
      const ranges = [];
      collectRanges(text, strongWhWords, "wh", ranges);
      collectRanges(text, weakWhPhrases, "wh-soft", ranges);
      collectRanges(text, subjectPhrases, "subj", ranges);
      collectRanges(text, softAuxWords, "aux-soft", ranges);
      collectRanges(text, verbPhrases, "verb", ranges);
      return ranges.sort((a, b) => a.start - b.start);
    }

    function highlightEnglish(text) {
      const ranges = getRanges(text);
      let html = "";
      let cursor = 0;
      ranges.forEach(range => {
        html += escapeHTML(text.slice(cursor, range.start));
        html += `<span class="mark ${range.className}">${escapeHTML(text.slice(range.start, range.end))}</span>`;
        cursor = range.end;
      });
      html += escapeHTML(text.slice(cursor));
      return html;
    }

    function highlightIndirect(text, clause) {
      const lowerText = text.toLowerCase();
      const lowerClause = clause.toLowerCase();
      const start = lowerText.indexOf(lowerClause);
      if (start === -1) return highlightEnglish(text);
      const end = start + clause.length;
      return escapeHTML(text.slice(0, start)) + highlightEnglish(text.slice(start, end)) + escapeHTML(text.slice(end));
    }

    function stageEnglishHtml(item, index) {
      const def = stageDefs[index];
      if (def.indirect) return highlightIndirect(item.indirectEn, item.clauseEn);
      return highlightEnglish(item[def.keyEn]);
    }

    function getSavedAnswer(itemIndex, stageIndex, wordIndex) {
      const answers = getItemState(itemIndex).answers[stageIndex] || [];
      return typeof answers[wordIndex] === "string" ? answers[wordIndex] : "";
    }

    function setSavedAnswer(itemIndex, stageIndex, wordIndex, value) {
      getItemState(itemIndex).answers[stageIndex][wordIndex] = String(value || "");
      saveAll();
    }

    function renderPanelLearn(item, index, visible) {
      const def = stageDefs[index];
      return `
        <section class="panel ${index === 0 ? "base" : ""} ${visible ? "" : "hidden"}">
          <div>
            <div class="stage">${def.title}</div>
            <div class="ko">${escapeHTML(item[def.keyKo])}</div>
            <div class="en">${stageEnglishHtml(item, index)}</div>
          </div>
        </section>
      `;
    }

    function renderPanelPractice(item, index) {
      const def = stageDefs[index];
      if (index === 0) {
        return `
          <section class="panel base">
            <div>
              <div class="stage">${def.title}</div>
              <div class="ko">${escapeHTML(item[def.keyKo])}</div>
              <div class="en">${stageEnglishHtml(item, index)}</div>
            </div>
          </section>
        `;
      }
      return `
        <section class="panel">
          <div>
            <div class="stage">${def.title}</div>
            <div class="ko">${escapeHTML(item[def.keyKo])}</div>
            <div class="blank-line">${renderBlankLine(item[def.keyEn], index)}</div>
          </div>
        </section>
      `;
    }

    function renderArrow(index, learnMode) {
      if (!learnMode) return `<div class="arrow-cell"><span class="arrow-static">→</span></div>`;
      if (index < revealLevel - 1) return `<div class="arrow-cell"><span class="arrow-static">→</span></div>`;
      if (index === revealLevel - 1 && revealLevel < 5) return `<div class="arrow-cell"><button class="arrow-btn" onclick="revealNext()">→</button></div>`;
      return `<div class="arrow-cell hidden"><span class="arrow-static">→</span></div>`;
    }

    function renderGrid(panelRenderer, learnMode) {
      const item = data[cardIndex];
      let html = `<div class="stage-grid">`;
      for (let i = 0; i < 5; i++) {
        html += panelRenderer(item, i, i < revealLevel);
        if (i < 4) html += renderArrow(i, learnMode);
      }
      html += `</div>`;
      return html;
    }

    function tokenizeForBlanks(text) {
      const tokens = [];
      const re = /[A-Za-z]+(?:'[A-Za-z]+)?|[.,?!]/g;
      let match;
      while ((match = re.exec(text)) !== null) {
        tokens.push({
          type: /[.,?!]/.test(match[0]) ? "punc" : "word",
          value: match[0],
          start: match.index,
          end: match.index + match[0].length
        });
      }
      return tokens;
    }

    function roleClassForToken(token, text) {
      const ranges = getRanges(text);
      const matched = ranges.find(r => token.start >= r.start && token.end <= r.end);
      return matched ? matched.className : "";
    }

    function blankWidth(token) {
      return Math.max(42, Math.min(118, token.length * 11 + 22));
    }

    function renderBlankLine(text, stageIndex) {
      const tokens = tokenizeForBlanks(text);
      let wordIndex = 0;
      return tokens.map((token) => {
        if (token.type === "punc") return `<span class="punc">${escapeHTML(token.value)}</span>`;
        const role = roleClassForToken(token, text);
        const value = getSavedAnswer(cardIndex, stageIndex, wordIndex);
        const html = `<input class="word-blank ${role}" style="width:${blankWidth(token.value)}px" data-stage="${stageIndex}" data-word-index="${wordIndex}" data-expected="${escapeHTML(token.value)}" value="${escapeHTML(value)}" autocomplete="off" autocapitalize="off" spellcheck="false" oninput="handleBlankInput(this)" />`;
        wordIndex += 1;
        return html;
      }).join("");
    }

    function normalizeWord(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .replace(/[’‘]/g, "'")
        .replace(/[^a-z']/g, "")
        .replace(/'/g, "");
    }

    function gradeStage(stageIndex) {
      const inputs = Array.from(document.querySelectorAll(`.word-blank[data-stage="${stageIndex}"]`));
      const allFilled = inputs.length > 0 && inputs.every(input => input.value.trim().length > 0);
      if (!allFilled) {
        inputs.forEach(input => input.classList.remove("correct", "wrong"));
        return;
      }
      inputs.forEach(input => {
        const expected = normalizeWord(input.dataset.expected);
        const actual = normalizeWord(input.value);
        input.classList.toggle("correct", actual === expected);
        input.classList.toggle("wrong", actual !== expected);
      });
    }

    function gradeAllStages() {
      BLANK_STAGE_INDEXES.forEach((stageIndex) => gradeStage(stageIndex));
    }

    function handleBlankInput(input) {
      const stageIndex = Number(input.dataset.stage);
      const wordIndex = Number(input.dataset.wordIndex);
      setSavedAnswer(cardIndex, stageIndex, wordIndex, input.value);
      gradeStage(stageIndex);
      if (saveStatusEl) {
        saveStatusEl.style.display = "block";
        saveStatusEl.textContent = isSubmitting ? "제출 중..." : "답안은 브라우저에 자동 저장됩니다.";
      }
    }

    function countWordTokens(itemIndex, stageIndex) {
      return tokenizeForBlanks(data[itemIndex][stageDefs[stageIndex].keyEn]).filter((token) => token.type === "word").length;
    }

    function focusFirstBlank() {
      const inputs = Array.from(document.querySelectorAll(".word-blank"));
      const firstEmpty = inputs.find((input) => !input.value.trim());
      const target = firstEmpty || inputs[0];
      if (target) target.focus();
    }

    function validateCurrentPractice() {
      const state = getItemState(cardIndex);
      const hasMissing = BLANK_STAGE_INDEXES.some((stageIndex) => {
        const wordCount = countWordTokens(cardIndex, stageIndex);
        for (let i = 0; i < wordCount; i += 1) {
          if (!String(state.answers[stageIndex][i] || "").trim()) return true;
        }
        return false;
      });

      if (!hasMissing) return true;
      focusFirstBlank();
      showToast("no", "빈칸을 다 채워주세요.");
      return false;
    }

    function buildStageAnswerText(itemIndex, stageIndex) {
      const tokens = tokenizeForBlanks(data[itemIndex][stageDefs[stageIndex].keyEn]);
      let wordIndex = 0;
      let text = "";

      tokens.forEach((token) => {
        if (token.type === "punc") {
          text = `${text.trimEnd()}${token.value}`;
          return;
        }

        const answer = String(getSavedAnswer(itemIndex, stageIndex, wordIndex) || "").trim();
        if (answer) text += `${text ? " " : ""}${answer}`;
        wordIndex += 1;
      });

      return text.trim();
    }

    function buildSubmissionText() {
      return data.map((_, index) => [
        `[item ${index + 1}]`,
        `stage2: ${buildStageAnswerText(index, 1)}`,
        `stage3: ${buildStageAnswerText(index, 2)}`,
        `stage4: ${buildStageAnswerText(index, 3)}`,
        `stage5: ${buildStageAnswerText(index, 4)}`
      ].join("\n")).join("\n\n");
    }

    function renderDoneState() {
      countEl.textContent = "오늘 숙제 끝!";
      mainEl.style.display = "none";
      bottomBarEl.style.display = "none";
      donePanelEl.classList.add("active");
    }

    function clearDoneState() {
      mainEl.style.display = "";
      bottomBarEl.style.display = "";
      donePanelEl.classList.remove("active");
    }

    function renderLearn() {
      mainEl.innerHTML = renderGrid(renderPanelLearn, true);
      saveStatusEl.style.display = "none";
      saveStatusEl.textContent = "";
      bottomRow.innerHTML = revealLevel >= 5
        ? `<button class="solo-btn" type="button" onclick="startPractice()">혼자 해보세요</button>`
        : "";
    }

    function renderPractice() {
      mainEl.innerHTML = renderGrid(renderPanelPractice, false);
      saveStatusEl.style.display = "block";
      saveStatusEl.textContent = isSubmitting ? "제출 중..." : "답안은 브라우저에 자동 저장됩니다.";
      bottomRow.innerHTML = `
        <button class="review-btn" type="button" onclick="returnToLearn()">다시 보기</button>
        <button class="solo-btn" type="button" onclick="saveAndAdvance()">${cardIndex >= data.length - 1 ? "저장하고 제출" : "저장하고 다음"}</button>
      `;
      if (isSubmitting) {
        document.querySelectorAll("#bottomRow button").forEach((button) => {
          button.disabled = true;
        });
      }
      setTimeout(() => {
        gradeAllStages();
        focusFirstBlank();
      }, 0);
    }

    function render() {
      initToast();
      if (submittedToday) {
        renderDoneState();
        return;
      }

      clearDoneState();
      countEl.textContent = `${cardIndex + 1} / ${data.length}`;
      if (practiceMode) renderPractice();
      else renderLearn();
      saveAll();
    }

    function revealNext() {
      revealLevel = Math.min(5, revealLevel + 1);
      render();
    }

    function startPractice() {
      revealLevel = 5;
      practiceMode = true;
      render();
    }

    function returnToLearn() {
      practiceMode = false;
      revealLevel = 5;
      render();
    }

    async function submitAllAnswers() {
      if (isSubmitting) return;
      if (submittedToday) {
        showToast("no", "오늘은 이미 제출했습니다.");
        return;
      }

      const userId = getCurrentUserId();
      if (!userId) {
        showToast("no", "id가 없습니다.");
        return;
      }

      isSubmitting = true;
      render();

      try {
        const txtContent = buildSubmissionText();
        const file = new File(
          [txtContent],
          `imsi_user_custom_hw_${userId}.txt`,
          { type: "text/plain" }
        );

        const formData = new FormData();
        formData.append("UserId", userId);
        formData.append("Subcategory", DIRECT_SUBCATEGORY);
        formData.append("HWType", DIRECT_HWTYPE);
        formData.append("LessonNo", 0);
        formData.append("Comment", DIRECT_COMMENT);
        formData.append("HWImage", file);

        const res = await fetch(HWPLUS_API_URL, {
          method: "POST",
          body: formData
        });
        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(result && result.message ? String(result.message) : String(res.status));
        }

        const confirmed = await waitForServerSubmission(userId);
        if (!confirmed) {
          clearSubmitMarker();
          submittedToday = false;
          isSubmitting = false;
          render();
          showToast("no", "제출 실패");
          return;
        }

        writeSubmitMarker(userId, getKstTodayString());
        resetWorkbookState();
        saveAll();
        submittedToday = true;
        isSubmitting = false;
        render();
        showToast("ok", "제출 완료!");
        scheduleAdvance(() => {
          window.location.replace(buildTrayUrl());
        }, 620);
      } catch (err) {
        console.error(err);
        isSubmitting = false;
        render();
        showToast("no", "제출 실패");
      }
    }

    function saveAndAdvance() {
      if (advanceTimer || isSubmitting) return;
      if (!validateCurrentPractice()) return;

      saveAll();
      if (cardIndex >= data.length - 1) {
        submitAllAnswers();
        return;
      }

      showToast("ok", "저장 완료!");
      scheduleAdvance(() => {
        cardIndex += 1;
        revealLevel = 1;
        practiceMode = false;
        render();
      }, 240);
    }

    (async function init() {
      submittedToday = await checkSubmittedToday();
      render();
    })();
  </script>
</body>
</html>
