      letter-spacing: -0.04em;
      text-align: center;
    }

      background: rgba(255, 250, 240, 0.95);

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;

      color: #5f442d;
    }

    .score {
      color: #15977f;
    }

      border-radius: 22px;
      padding: 24px;

      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;

      align-items: center;
      justify-content: center;

      height: 34px;
      border-radius: 999px;
      background: #3fc5aa;
      color: white;
      font-weight: 900;
      flex: 0 0 auto;

      padding: 5px 10px;
      border-radius: 999px;
      background: #4b3827;
      color: white;
      font-size: 13px;
      font-weight: 900;
    }

    .question {
      margin: 10px 0 18px;
      font-size: 19px;
      line-height: 1.65;
      font-weight: 900;
      color: #332519;
      white-space: pre-line;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 13px 14px;
      border: 1.5px solid #d6bd94;
      border-radius: 15px;
      background: white;
      cursor: pointer;
      transition: 0.15s;
      line-height: 1.55;
      font-size: 15.5px;
    }

    .option:hover {
      background: #fbf1df;
    }

    .option.disabled {
      cursor: default;
    }

    .option.disabled:hover {
      background: white;
    }

    .option input {
      margin-top: 4px;
      flex: 0 0 auto;
    }

    .option.correct-choice {
      background: #dff7ee;
      border-color: #3fc5aa;
      box-shadow: inset 0 0 0 1px #3fc5aa;
    }

    .option.wrong-choice {
      background: #ffe1dc;
      border-color: #e36b5d;
    }

    .option.correct-answer {
      border-color: #3fc5aa;
      box-shadow: inset 0 0 0 1px #3fc5aa;
    }

    .feedback {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 15px;
      background: #f2e5cf;
      border: 1px solid #d9bd8c;
      font-size: 14.5px;
      line-height: 1.75;
      color: #4d3927;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct {
      background: #e4f7ef;
      border-color: #70cdb5;
    }

    .feedback.wrong {
      background: #ffe5df;
      border-color: #e58b7d;
    }

    .result-word {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .result-word.correct {
      color: #15977f;
    }

    .result-word.wrong {
      color: #d95448;
    }

    .bottom {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 999px;
      background: #4b3827;
      color: white;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .finish-card {
      text-align: center;
      padding: 34px 24px;
    }

    .finish-title {
      font-size: 25px;
      font-weight: 900;
      margin-bottom: 14px;
      color: #332519;
    }

    .finish-score {
      font-size: 22px;
      font-weight: 900;
      color: #15977f;
      margin-bottom: 12px;
    }

    .finish-comment {
      font-size: 15px;
      line-height: 1.7;
      color: #6b5138;
    }

    .submit-status {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 900;
      color: #4b3827;
      min-height: 20px;
    }

    @media print {
      body {
        background: white;
        padding: 12mm;
        display: block;
      }

      .wrap {
        max-width: none;
      }

      .topbar,
      .bottom {
        display: none;
      }

      .card {
        box-shadow: none;
      }
    }
  </style>
</head>

    let answered = false;
    let submittedToday = false;
    let isSubmitting = false;
    let submitStatus = "";
    let advanceTimer = null;
    const answerLog = questions.map(() => null);

    const quiz = document.getElementById("quiz");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");

    function initToast() {
      if (!window.ImsiToastFX || typeof window.ImsiToastFX.init !== "function") return;
      if (initToast.ready) return;
      window.ImsiToastFX.init({ hostId: "cafe_int", top: 10 });
      initToast.ready = true;
    }

    function showToast(kind, message, options) {
      if (window.ImsiToastFX && typeof window.ImsiToastFX.show === "function") {
        window.ImsiToastFX.show(kind, message, options);
      }
    }

    function getCurrentUserId() {
      try {
        return String(new URLSearchParams(window.location.search || "").get("id") || "").trim();
      } catch (_) {
        return "";
      }
    }

    function getKstTodayString() {
      const now = new Date(Date.now() + (9 * 60 * 60 * 1000));
      return now.toISOString().slice(0, 10);
    }

    function readSubmitMarker() {
      try {
        const raw = localStorage.getItem(SUBMIT_MARKER_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" ? parsed : null;
      } catch (_) {
        return null;
      }
    }

    function writeSubmitMarker(userId, dateStr) {
      localStorage.setItem(SUBMIT_MARKER_KEY, JSON.stringify({
        userId: String(userId || ""),
        date: String(dateStr || "")
      }));
    }

    function clearSubmitMarker() {
      localStorage.removeItem(SUBMIT_MARKER_KEY);
    }

    function hasLocalSubmittedToday(userId) {
      const marker = readSubmitMarker();
      if (!marker) return false;
      return String(marker.userId || "") === String(userId || "") && String(marker.date || "") === getKstTodayString();
    }

    async function fetchSubmittedTodayFromServer(userId) {
      const res = await fetch(`${HWPLUS_API_URL.replace("/saveHWPlus", "/getHWPlus")}?userId=${encodeURIComponent(userId)}`);
      if (!res.ok) throw new Error(String(res.status));

      const data = await res.json();
      if (!Array.isArray(data)) return false;

      const todayStr = getKstTodayString();
      return data.some((item) => {
        const timestamp = String(item.Timestamp || item.timestamp || "");
        const subcategory = String(item.Subcategory || item.subcategory || "").trim();
        const hwType = String(item.HWType || item.hwtype || "").trim();
        const comment = String(item.Comment || item.comment || "").trim();
        return (
          timestamp.startsWith(todayStr) &&
          subcategory === DIRECT_SUBCATEGORY &&
          hwType === DIRECT_HWTYPE &&
          comment === DIRECT_COMMENT
        );
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitForServerSubmission(userId, attempts = 4, delayMs = 450) {
      for (let i = 0; i < attempts; i += 1) {
        try {
          if (await fetchSubmittedTodayFromServer(userId)) return true;
        } catch (_) {
        }

        if (i < attempts - 1) await wait(delayMs);
      }
      return false;
    }

    async function checkSubmittedToday() {
      const userId = getCurrentUserId();
      if (!userId) return false;

      const hasLocalMarker = hasLocalSubmittedToday(userId);
      try {
        const hasServerRecord = await fetchSubmittedTodayFromServer(userId);
        if (hasServerRecord) {
          if (!hasLocalMarker) writeSubmitMarker(userId, getKstTodayString());
          return true;
        }
        if (hasLocalMarker) clearSubmitMarker();
        return false;
      } catch (_) {
        return hasLocalMarker;
      }
    }

    function scheduleAdvance(callback, delay) {
      clearTimeout(advanceTimer);
      advanceTimer = setTimeout(() => {
        advanceTimer = null;
        callback();
      }, delay);
    }

    function buildTrayUrl() {
      const userId = getCurrentUserId();
      const target = new URL("homework-tray_v1.html", window.location.href);
      if (userId) target.searchParams.set("id", userId);
      return target.toString();
    }

    function escapeHTML(text) {
      return String(text).replace(/[&<>'"]/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      }[char]));
    }

    function optionLabel(item, optionIndex) {
      if (!Number.isInteger(optionIndex) || optionIndex < 0 || optionIndex >= item.options.length) {
        return "not answered";
      }
      return `${optionIndex + 1}. ${item.options[optionIndex]}`;
    }

    function buildSubmissionText(userId) {
      const lines = [
        `userId: ${userId}`,
        `date: ${getKstTodayString()}`,
        `score: ${score} / ${questions.length}`,
        ""
      ];

      questions.forEach((item, index) => {
        const saved = answerLog[index];
        const selected = saved && Number.isInteger(saved.selected) ? saved.selected : null;
        const isCorrect = selected === item.answer;

        lines.push(`[item ${index + 1}]`);
        lines.push(`\uBB38\uC81C: ${item.q}`);
        lines.push(`\uC815\uB2F5\uC9C0: ${optionLabel(item, item.answer)}`);
        lines.push(`selected: ${optionLabel(item, selected)}`);
        lines.push(`\uC815\uC624\uB2F5\uC5EC\uBD80: ${isCorrect ? "\uC815\uB2F5" : "\uC624\uB2F5"}`);
        lines.push("");
      });

      return lines.join("\n");
    }

    function renderSubmitStatus() {
      const statusEl = document.getElementById("submitStatus");
      if (statusEl) statusEl.textContent = submitStatus;
    }

    function renderDoneState() {
      progressEl.textContent = "\uC644\uB8CC";
      scoreEl.textContent = "";
      quiz.innerHTML = `
        <div class="card finish-card">
          <div class="finish-title">\uC624\uB298 \uC219\uC81C \uB05D!</div>
          <div class="finish-comment">\uC81C\uCD9C\uC774 \uC644\uB8CC\uB41C \uAE30\uB85D\uC774 \uC788\uC2B5\uB2C8\uB2E4.</div>
        </div>
      `;
    }

    function renderQuestion() {
      answered = false;

      const item = questions[currentIndex];

      progressEl.textContent = `${currentIndex + 1} / ${questions.length}`;
      scoreEl.textContent = `점수: ${score}`;

      quiz.innerHTML = `
        <div class="card">
          <div class="head">
            <div class="num">${currentIndex + 1}</div>
            <div class="type">${item.type}</div>
          </div>

          <div class="question">${item.q}</div>

          <div class="options">
            ${item.options.map((opt, i) => `
              <label class="option" data-option="${i}">
                <input type="radio" name="answer" value="${i}" />
                <span>${i + 1}. ${opt}</span>
              </label>
            `).join("")}
          </div>

          <div class="feedback" id="feedback"></div>

          <div class="bottom">
            <button id="nextBtn" disabled>
              ${currentIndex === questions.length - 1 ? "결과 보기" : "다음 문제"}
            </button>
          </div>
        </div>
      `;

      document.querySelectorAll(".option").forEach(optionEl => {
        optionEl.addEventListener("click", () => {
          if (answered) return;
          const selected = Number(optionEl.dataset.option);
          grade(selected);
        });
      });

      document.getElementById("nextBtn").addEventListener("click", goNext);
    }

    function grade(selected) {
      answered = true;

      const item = questions[currentIndex];
      const isCorrect = selected === item.answer;
      answerLog[currentIndex] = {
        selected,
        answer: item.answer,
        isCorrect
      };

      if (isCorrect) score++;

      const optionEls = document.querySelectorAll(".option");
      const inputs = document.querySelectorAll("input[name='answer']");

      inputs.forEach(input => {
        input.disabled = true;
      });

      optionEls.forEach((el, i) => {
        el.classList.add("disabled");

        if (i === item.answer) {
          el.classList.add("correct-answer");
        }

        if (i === selected && isCorrect) {
          el.classList.add("correct-choice");
        }

        if (i === selected && !isCorrect) {
          el.classList.add("wrong-choice");
        }
      });

      const feedback = document.getElementById("feedback");
      feedback.className = `feedback show ${isCorrect ? "correct" : "wrong"}`;
      feedback.innerHTML = `
        <div class="result-word ${isCorrect ? "correct" : "wrong"}">
          ${isCorrect ? "정답입니다." : "오답입니다."}
        </div>
        <div><b>정답:</b> ${item.answer + 1}. ${item.options[item.answer]}</div>
        <div>${item.exp}</div>
      `;

      document.getElementById("nextBtn").disabled = false;
      scoreEl.textContent = `점수: ${score}`;
    }

    function goNext() {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        renderResult();
      }
    }

    async function submitAllAnswers() {
      if (isSubmitting) return;
      if (submittedToday) {
        submitStatus = "\uC624\uB298\uC740 \uC774\uBBF8 \uC81C\uCD9C\uD588\uC2B5\uB2C8\uB2E4.";
        renderSubmitStatus();
        showToast("no", submitStatus);
        return;
      }

      const userId = getCurrentUserId();
      if (!userId) {
        submitStatus = "id\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.";
        renderSubmitStatus();
        showToast("no", submitStatus);
        return;
      }

      isSubmitting = true;
      submitStatus = "\uC81C\uCD9C \uC911...";
      renderSubmitStatus();

      try {
        const txtContent = buildSubmissionText(userId);
        const file = new File(
          [txtContent],
          `imsi_bitnalee_hw_2_${userId}.txt`,
          { type: "text/plain" }
        );

        const formData = new FormData();
        formData.append("UserId", userId);
        formData.append("Subcategory", DIRECT_SUBCATEGORY);
        formData.append("HWType", DIRECT_HWTYPE);
        formData.append("LessonNo", 0);
        formData.append("Comment", DIRECT_COMMENT);
        formData.append("HWImage", file);

        const res = await fetch(HWPLUS_API_URL, {
          method: "POST",
          body: formData
        });
        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(result && result.message ? String(result.message) : String(res.status));
        }

        submitStatus = "\uC81C\uCD9C \uD655\uC778 \uC911...";
        renderSubmitStatus();

        const confirmed = await waitForServerSubmission(userId);
        if (!confirmed) {
          clearSubmitMarker();
          submittedToday = false;
          submitStatus = "\uC81C\uCD9C \uC2E4\uD328";
          renderSubmitStatus();
          showToast("no", submitStatus);
          return;
        }

        writeSubmitMarker(userId, getKstTodayString());
        submittedToday = true;
        submitStatus = "\uC81C\uCD9C \uC644\uB8CC!";
        renderSubmitStatus();
        showToast("ok", submitStatus);
        scheduleAdvance(() => {
          window.location.replace(buildTrayUrl());
        }, 620);
      } catch (err) {
        console.error(err);
        submitStatus = "\uC81C\uCD9C \uC2E4\uD328";
        renderSubmitStatus();
        showToast("no", submitStatus);
      } finally {
        isSubmitting = false;
      }
    }

    function renderResult() {
      progressEl.textContent = `완료`;
      scoreEl.textContent = `점수: ${score} / ${questions.length}`;

      const percent = Math.round((score / questions.length) * 100);

      let comment = "";

      if (percent >= 90) {
        comment = "상위권 내신 문법 감각이 꽤 안정적입니다. 헷갈린 문항만 다시 보면 됩니다.";
      } else if (percent >= 75) {
        comment = "기본기는 좋습니다. 간접의문문과 목적어 to부정사가 섞인 문장에서 실수가 나오는지 확인하세요.";
      } else if (percent >= 60) {
        comment = "구조를 아예 모르는 수준은 아니지만, 보기끼리 비슷할 때 흔들릴 가능성이 있습니다.";
      } else {
        comment = "문법 이름보다 문장 안에서 주어·동사·목적어 위치를 다시 잡는 연습이 필요합니다.";
      }

      quiz.innerHTML = `
        <div class="card finish-card">
          <div class="finish-title">완료!</div>
          <div class="finish-score">${score} / ${questions.length}점</div>
          <div class="finish-comment">${comment}</div>
          <div class="submit-status" id="submitStatus">${escapeHTML(submitStatus)}</div>
        </div>
      `;

      window.scrollTo({ top: 0, behavior: "smooth" });
      submitAllAnswers();
    }

    (async function init() {
      initToast();
      submittedToday = await checkSubmittedToday();
      if (submittedToday) {
        renderDoneState();
        return;
      }
      renderQuestion();
    })();
  </script>
</body>
</html>
